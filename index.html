<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"
    />
    <meta name="theme-color" content="#101010" />
    <title>UniversalCaller</title>
    <style>
      :root {
        --bg: #101010;
        --s: #191919;
        --s2: #232323;
        --b: #303030;
        --t: #f2f2f2;
        --m: #8e8e8e;
        --d: #e33d39;
        --ok: #9fd2ad;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--t);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
      }
      body {
        min-height: 100dvh;
      }
      button,
      input {
        font: inherit;
      }
      .hidden {
        display: none !important;
      }
      .app {
        max-width: 560px;
        min-height: 100dvh;
        margin: auto;
        padding: max(10px, env(safe-area-inset-top))
          max(12px, env(safe-area-inset-right))
          calc(24px + env(safe-area-inset-bottom))
          max(12px, env(safe-area-inset-left));
      }
      .top {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        gap: 8px;
        align-items: center;
        padding-bottom: 14px;
        background: rgba(16, 16, 16, 0.94);
        backdrop-filter: blur(18px);
      }
      .search {
        position: relative;
        flex: 1;
      }
      .search svg {
        position: absolute;
        left: 14px;
        top: 13px;
        width: 18px;
        height: 18px;
        fill: none;
        stroke: #888;
        stroke-width: 1.8;
      }
      .search input {
        width: 100%;
        height: 44px;
        padding: 0 14px 0 40px;
        border: 1px solid transparent;
        border-radius: 14px;
        background: var(--s);
        color: var(--t);
        outline: 0;
      }
      .search input:focus {
        border-color: #444;
      }
      .icon {
        display: grid;
        place-items: center;
        width: 40px;
        height: 42px;
        border: 0;
        border-radius: 50%;
        background: transparent;
        color: #eee;
      }
      .icon svg {
        width: 24px;
        height: 24px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.55;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .me {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 32px;
        color: var(--m);
        font-size: 12px;
      }
      .me span {
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--ok);
      }
      .mini {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        object-fit: cover;
        background: #292929;
      }
      .contacts {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding-top: 10px;
      }
      .contact {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 72px;
        padding: 10px 12px;
        background: #181818;
        border: 1px solid #303030;
        border-radius: 17px;
        transition: background 0.18s ease, border-color 0.18s ease, transform 0.16s ease;
      }
      .contact:active {
        background: #1d1d1d;
        border-color: #3a3a3a;
        transform: scale(0.99);
      }
      .avaw {
        position: relative;
        width: 50px;
        height: 50px;
        flex: 0 0 50px;
      }
      .ava {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        object-fit: cover;
        background: #292929;
      }
      .presence {
        position: absolute;
        right: 0;
        bottom: 1px;
        width: 11px;
        height: 11px;
        border: 2px solid var(--bg);
        border-radius: 50%;
        background: #555;
      }
      .presence.on {
        background: var(--ok);
      }
      .ci {
        min-width: 0;
        flex: 1;
      }
      .ci h3 {
        margin: 0 0 5px;
        font-size: 15px;
      }
      .ci p {
        margin: 0;
        color: var(--m);
        font-size: 13px;
      }
      .call {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border: 0;
        border-radius: 50%;
        background: transparent;
        color: #ddd;
      }
      .call svg {
        width: 21px;
        height: 21px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .empty {
        padding: 48px 16px;
        text-align: center;
        color: var(--m);
        font-size: 14px;
      }
      .overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 16px max(16px, env(safe-area-inset-right))
          calc(16px + env(safe-area-inset-bottom))
          max(16px, env(safe-area-inset-left));
        background: rgba(0, 0, 0, 0.68);
        backdrop-filter: blur(8px);
        opacity: 0;
        visibility: hidden;
        transition: 0.2s;
      }
      .overlay.show {
        opacity: 1;
        visibility: visible;
      }
      .sheet {
        width: 100%;
        max-width: 520px;
        max-height: calc(100dvh - 28px);
        overflow: auto;
        padding: 10px 18px 22px;
        border: 1px solid var(--b);
        border-radius: 24px;
        background: #1a1a1a;
        transform: translateY(24px);
        transition: 0.22s;
      }
      .overlay.show .sheet {
        transform: none;
      }
      .handle {
        width: 38px;
        height: 4px;
        margin: 0 auto 22px;
        border-radius: 99px;
        background: #555;
      }
      .sheet h2 {
        margin: 0 0 18px;
      }
      .field {
        width: 100%;
        height: 48px;
        margin-bottom: 10px;
        padding: 0 14px;
        border: 1px solid #333;
        border-radius: 14px;
        background: var(--s2);
        color: var(--t);
        outline: 0;
      }
      .field:focus {
        border-color: #555;
      }
      .row {
        display: flex;
        gap: 10px;
      }
      .btn {
        flex: 1;
        min-height: 48px;
        padding: 0 16px;
        border: 0;
        border-radius: 14px;
        background: #292929;
        color: var(--t);
        font-weight: 650;
      }
      .btn.primary {
        background: #eee;
        color: #151515;
      }
      .btn.danger {
        background: var(--d);
        color: white;
      }
      .hint {
        min-height: 18px;
        margin: 4px 0 12px;
        color: var(--m);
        font-size: 12px;
      }
      .hint.error {
        color: #e49a9a;
      }
      .pa {
        position: relative;
        width: 96px;
        height: 96px;
        margin: 0 auto 20px;
      }
      .pa img {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        object-fit: cover;
        background: #252525;
      }
      .pick {
        position: absolute;
        right: -2px;
        bottom: -2px;
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 3px solid #1a1a1a;
        border-radius: 50%;
        background: #eee;
        color: #111;
      }
      .pick svg {
        width: 17px;
        height: 17px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
      }
      .setting {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 58px;
        border-bottom: 1px solid var(--b);
      }
      .switch {
        position: relative;
        width: 44px;
        height: 26px;
        border: 0;
        border-radius: 99px;
        background: #363636;
      }
      .switch:after {
        content: "";
        position: absolute;
        left: 3px;
        top: 3px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #bbb;
        transition: 0.2s;
      }
      .switch.on {
        background: #eee;
      }
      .switch.on:after {
        left: 21px;
        background: #181818;
      }
      .seg {
        display: flex;
        padding: 3px;
        border-radius: 11px;
        background: #242424;
      }
      .seg button {
        min-height: 34px;
        padding: 0 11px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: var(--m);
        font-size: 12px;
      }
      .seg button.on {
        background: #eee;
        color: #151515;
      }
      .auth {
        position: fixed;
        inset: 0;
        z-index: 300;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 22px;
        background:
          radial-gradient(
            circle at 50% 25%,
            rgba(255, 255, 255, 0.05),
            transparent 35%
          ),
          #101010;
      }
      .authcard {
        width: 100%;
        max-width: 390px;
        padding: 26px;
        border: 1px solid #2e2e2e;
        border-radius: 24px;
        background: #191919;
      }
      .callscreen {
        position: fixed;
        inset: 0;
        z-index: 220;
        display: flex;
        align-items: center;
        flex-direction: column;
        min-height: 100dvh;
        padding: max(18px, env(safe-area-inset-top))
          max(20px, env(safe-area-inset-right))
          calc(30px + env(safe-area-inset-bottom))
          max(20px, env(safe-area-inset-left));
        background:
          radial-gradient(
            circle at 50% 28%,
            rgba(255, 255, 255, 0.04),
            transparent 35%
          ),
          #101010;
        opacity: 0;
        visibility: hidden;
        transition: 0.22s;
      }
      .callscreen.show {
        opacity: 1;
        visibility: visible;
      }
      .verify {
        position: absolute;
        top: max(18px, env(safe-area-inset-top));
        left: 50%;
        transform: translateX(-50%);
        display: none;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 7px 14px;
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 14px;
        background: rgba(34, 34, 34, 0.86);
        font-weight: 700;
        letter-spacing: 0.18em;
        white-space: nowrap;
      }
      .verify.show {
        display: flex;
      }
      .verify.emoji {
        font-size: 22px;
        letter-spacing: 0;
      }
      .callmain {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: clamp(88px, 14vh, 145px);
        text-align: center;
      }
      .callmain img {
        width: clamp(104px, 29vw, 128px);
        height: clamp(104px, 29vw, 128px);
        border-radius: 50%;
        object-fit: cover;
        background: #252525;
      }
      .callmain h2 {
        margin: 22px 0 9px;
      }
      .callmain p {
        margin: 0;
        color: var(--m);
        font-variant-numeric: tabular-nums;
      }
      .controls {
        display: flex;
        gap: clamp(14px, 4.5vw, 21px);
        margin-top: auto;
      }
      .control {
        display: grid;
        place-items: center;
        width: clamp(58px, 17vw, 66px);
        height: clamp(58px, 17vw, 66px);
        border: 0;
        border-radius: 50%;
        background: #292929;
        color: white;
      }
      .control svg {
        width: 27px;
        height: 27px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .control.on,
      .control.muted {
        background: #eee;
        color: #111;
      }
      .control.end {
        background: var(--d);
      }
      .control.end svg {
        position: relative;
        top: -2px;
        width: 30px;
        height: 30px;
      }
      .slash {
        opacity: 0;
      }
      .control.muted .slash {
        opacity: 1;
      }
      .incoming {
        text-align: center;
      }
      .incoming img {
        width: 94px;
        height: 94px;
        border-radius: 50%;
        object-fit: cover;
        background: #252525;
      }
      .incoming h2 {
        margin: 15px 0 6px;
      }
      .incoming p {
        margin: 0 0 20px;
        color: var(--m);
      }
      audio {
        display: none;
      }
      @media (max-width: 370px) {
        .app {
          padding-left: 8px;
          padding-right: 8px;
        }
        .icon {
          width: 36px;
        }
        .seg button {
          padding: 0 8px;
          font-size: 11px;
        }
      }
    </style>
  </head>
  <body>
    <div id="authScreen" class="auth">
      <div class="authcard">
        <input
          id="authEmail"
          class="field"
          type="email"
          placeholder="Email"
        /><input
          id="authPassword"
          class="field"
          type="password"
          placeholder="Пароль — минимум 6 символов"
        /><input
          id="authUsername"
          class="field"
          placeholder="@username при регистрации"
          maxlength="16"
        />
        <div id="authHint" class="hint"></div>
        <div class="row">
          <button id="loginBtn" class="btn">Войти</button
          ><button id="registerBtn" class="btn primary">Регистрация</button>
        </div>
      </div>
    </div>
    <main class="app">
      <header class="top">
        <div class="search">
          <svg viewBox="0 0 24 24">
            <circle cx="10.5" cy="10.5" r="5.8"></circle>
            <path d="M15 15 20 20"></path></svg
          ><input
            id="searchInput"
            type="search"
            placeholder="Поиск по @username"
          />
        </div>
        <button id="settingsBtn" class="icon">
          <svg viewBox="0 0 24 24">
            <path
              d="M9.55 2.7h4.9L15 4.85c.48.17.94.42 1.35.7l2.15-.6 2.45 4.1-1.6 1.55c.05.46.05.94 0 1.4.05.46.05.94 0 1.4l1.6 1.55-2.45 4.1-2.15-.6c-.41.28-.87.53-1.35.7l-.55 2.15h-4.9L9 19.15c-.48-.17-.94-.42-1.35-.7l-2.15.6-2.45-4.1 1.6-1.55c-.05-.46-.05-.94 0-1.4-.05-.46-.05-.94 0-1.4L3.05 9.05l2.45-4.1 2.15.6c.41-.28.87-.53 1.35-.7z"
            ></path>
            <circle cx="12" cy="12" r="3.1"></circle>
          </svg></button
        ><button id="profileBtn" class="icon">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="7.5" r="3.4"></circle>
            <path d="M5.5 20c.55-4.1 3-6.2 6.5-6.2s5.95 2.1 6.5 6.2"></path>
          </svg>
        </button>
      </header>
      <section id="contactsList" class="contacts"></section>
      <div id="emptyState" class="empty"></div>
    </main>
    <div id="profileOverlay" class="overlay">
      <div class="sheet">
        <div class="handle"></div>
        <div class="pa">
          <img id="profileAvatar" /><label class="pick" for="avatarInput"
            ><svg viewBox="0 0 24 24">
              <path d="M4 7.5h3l1.4-2h7.2l1.4 2h3v11H4Z"></path>
              <circle cx="12" cy="13" r="3.2"></circle></svg></label
          ><input
            id="avatarInput"
            class="hidden"
            type="file"
            accept="image/png,image/jpeg,image/webp"
          />
        </div>
        <input
          id="profileUsername"
          class="field"
          maxlength="16"
          placeholder="@username"
        />
        <div id="profileHint" class="hint"></div>
        <div class="row">
          <button id="profileClose" class="btn">Закрыть</button
          ><button id="profileSave" class="btn primary">Сохранить</button>
        </div>
      </div>
    </div>
    <div id="settingsOverlay" class="overlay">
      <div class="sheet">
        <div class="handle"></div>
        <h2>Настройки</h2>
        <div class="setting">
          <span>Шифрование</span
          ><button id="encryptionSwitch" class="switch"></button>
        </div>
        <div id="displaySettings" class="setting hidden">
          <span>Отображение</span>
          <div class="seg">
            <button class="mode on" data-mode="emoji">Смайлики</button
            ><button class="mode" data-mode="code">Цифровой код</button>
          </div>
        </div>
        <button
          id="settingsClose"
          class="btn primary"
          style="width: 100%; margin-top: 20px"
        >
          Готово
        </button>
      </div>
    </div>
    <div id="incomingOverlay" class="overlay">
      <div class="sheet incoming">
        <div class="handle"></div>
        <img id="incomingAvatar" />
        <h2>Входящий звонок</h2>
        <p id="incomingUsername"></p>
        <div class="row">
          <button id="rejectBtn" class="btn danger">Отклонить</button
          ><button id="answerBtn" class="btn primary">Принять</button>
        </div>
      </div>
    </div>
    <div id="callScreen" class="callscreen">
      <div id="verification" class="verify"></div>
      <div class="callmain">
        <img id="callAvatar" />
        <h2 id="callName"></h2>
        <p id="callStatus">Вызов…</p>
      </div>
      <div class="controls">
        <button id="micBtn" class="control">
          <svg viewBox="0 0 24 24">
            <rect x="9" y="3" width="6" height="11" rx="3"></rect>
            <path d="M5.5 11.5a6.5 6.5 0 0 0 13 0"></path>
            <path d="M12 18v3"></path>
            <path d="M9 21h6"></path>
            <path class="slash" d="M4.5 4.5 19.5 19.5"></path>
          </svg></button
        ><button id="speakerBtn" class="control">
          <svg viewBox="0 0 24 24">
            <path d="M5 10v4h4l5 4V6l-5 4H5Z"></path>
            <path d="M17 9a4 4 0 0 1 0 6"></path>
            <path d="M19 6.5a8 8 0 0 1 0 11"></path>
          </svg></button
        ><button id="hangupBtn" class="control end">
          <svg viewBox="0 0 24 24">
            <path
              d="M4.65 14.7c4.3-3.45 10.4-3.45 14.7 0 .45.35.55 1 .2 1.45L18.1 18c-.35.45-1 .55-1.45.2l-2.1-1.65c-1.65-1.3-3.45-1.3-5.1 0l-2.1 1.65c-.45.35-1.1.25-1.45-.2l-1.45-1.85c-.35-.45-.25-1.1.2-1.45Z"
            ></path>
          </svg>
        </button>
      </div>
    </div>
    <audio id="remoteAudio" autoplay playsinline></audio>
    <script type="module">
      const firebaseConfig = {
        apiKey: "AIzaSyCtHhJRd1NaQKqyfiAJm2GJI5NI2h7W3AI",
        authDomain: "universalcaller-a398c.firebaseapp.com",
        projectId: "universalcaller-a398c",
        storageBucket: "universalcaller-a398c.firebasestorage.app",
        messagingSenderId: "734023782982",
        appId: "1:734023782982:web:0bb0f4b526540387d6ff047",
      };
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        signOut,
      } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
        updateDoc,
        collection,
        query,
        where,
        limit,
        onSnapshot,
        addDoc,
        serverTimestamp,
        runTransaction,
      } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";
      const app = initializeApp(firebaseConfig),
        auth = getAuth(app),
        db = getFirestore(app),
        $ = (id) => document.getElementById(id);
      const D =
        "data:image/svg+xml;charset=UTF-8," +
        encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#292929"/><circle cx="50" cy="36" r="17" fill="none" stroke="#ddd" stroke-width="5"/><path d="M20 87c3-22 15-33 30-33s27 11 30 33" fill="none" stroke="#ddd" stroke-width="5" stroke-linecap="round"/></svg>',
        );
      const RE = /^[a-zA-Z1-9_]{1,16}$/,
        ICE = [
          {
            urls: [
              "stun:stun.l.google.com:19302",
              "stun:stun1.l.google.com:19302",
              "stun:stun2.l.google.com:19302",
              "stun:stun3.l.google.com:19302",
              "stun:stun4.l.google.com:19302",
            ],
          },
        ];
      let u = null,
        p = null,
        pa = "",
        presenceTimer = null,
        inUn = null,
        callUn = null,
        candUn = null,
        inc = null,
        callRef = null,
        pc = null,
        ls = null,
        pendingRemoteCandidates = [],
        disconnectTimer = null,
        startAt = null,
        durTimer = null,
        muted = false,
        speaker = false,
        enc = localStorage.getItem("encryptionEnabled") === "true",
        mode = localStorage.getItem("displayMode") || "emoji";
      const DISCONNECT_GRACE_PERIOD = 15000;
      const clean = (v) =>
          v
            .replace(/^@+/, "")
            .replace(/[^a-zA-Z1-9_]/g, "")
            .slice(0, 16),
        hint = (el, t, e = false) => {
          el.textContent = t;
          el.classList.toggle("error", e);
        },
        open = (e) => {
          e.classList.add("show");
          document.body.style.overflow = "hidden";
        },
        close = (e) => {
          e.classList.remove("show");
          if (
            !document.querySelector(".overlay.show") &&
            !$("callScreen").classList.contains("show")
          )
            document.body.style.overflow = "";
        },
        online = (d) => Date.now() - (d?.lastSeen?.toMillis?.() || 0) < 9e4;
      let audioContext = null;

      function getAudioContext() {

      function playTone({
        frequency = 440,
        endFrequency = null,
        duration = 0.08,
        volume = 0.04,
        type = "sine",
        delay = 0,
      } = {}) {
        const context = getAudioContext();
        if (!context) return;
        const startTime = context.currentTime + delay;
        const endTime = startTime + duration;
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, startTime);
        if (endFrequency !== null) {
          oscillator.frequency.exponentialRampToValueAtTime(Math.max(endFrequency, 1), endTime);
        }
        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(volume, startTime + Math.min(0.018, duration / 3));
        gain.gain.exponentialRampToValueAtTime(0.0001, endTime);
        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start(startTime);
        oscillator.stop(endTime + 0.02);
      }

      function stopActiveRingbackNodes() {

      function playRingbackPulse() {
        const context = getAudioContext();
        if (!context) return;
        stopActiveRingbackNodes();
        const startTime = context.currentTime;
        const duration = 0.82;
        const endTime = startTime + duration;
        const master = context.createGain();
        const filter = context.createBiquadFilter();
        const first = context.createOscillator();
        const second = context.createOscillator();
        const firstGain = context.createGain();
        const secondGain = context.createGain();
        filter.type = "lowpass";
        filter.frequency.setValueAtTime(1200, startTime);
        first.type = "sine";
        second.type = "sine";
        first.frequency.setValueAtTime(425, startTime);
        second.frequency.setValueAtTime(450, startTime);
        firstGain.gain.setValueAtTime(0.68, startTime);
        secondGain.gain.setValueAtTime(0.32, startTime);
        master.gain.setValueAtTime(0.0001, startTime);
        master.gain.exponentialRampToValueAtTime(0.052, startTime + 0.08);
        master.gain.setValueAtTime(0.052, endTime - 0.12);
        master.gain.exponentialRampToValueAtTime(0.0001, endTime);
        first.connect(firstGain);
        second.connect(secondGain);
        firstGain.connect(filter);
        secondGain.connect(filter);
        filter.connect(master);
        master.connect(context.destination);
        first.start(startTime);
        second.start(startTime);
        first.stop(endTime);
        second.stop(endTime);
        activeRingbackNodes = [first, second];
        setTimeout(() => {
          try { first.disconnect(); second.disconnect(); firstGain.disconnect(); secondGain.disconnect(); filter.disconnect(); master.disconnect(); } catch (_) {}

      function playIncomingRingtonePulse() {
        const context = getAudioContext();

        if (!context) return;

        stopActiveIncomingRingtoneNodes();

        const startTime = context.currentTime;
        const duration = 1.35;
        const master = context.createGain();
        const filter = context.createBiquadFilter();

        filter.type = "lowpass";
        filter.frequency.setValueAtTime(1800, startTime);
        filter.Q.setValueAtTime(0.5, startTime);

        master.gain.setValueAtTime(0.0001, startTime);
        master.gain.exponentialRampToValueAtTime(0.065, startTime + 0.05);
        master.gain.setValueAtTime(0.065, startTime + 0.48);
        master.gain.exponentialRampToValueAtTime(0.0001, startTime + 0.64);
        master.gain.setValueAtTime(0.0001, startTime + 0.72);
        master.gain.exponentialRampToValueAtTime(0.065, startTime + 0.79);
        master.gain.setValueAtTime(0.065, startTime + 1.16);
        master.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

        const frequencies = [660, 880, 990];
        const gains = [0.52, 0.31, 0.17];

        const oscillators = frequencies.map((frequency, index) => {
          const oscillator = context.createOscillator();
          const oscillatorGain = context.createGain();

          oscillator.type = index === 0 ? "sine" : "triangle";
          oscillator.frequency.setValueAtTime(frequency, startTime);
          oscillatorGain.gain.setValueAtTime(gains[index], startTime);

          oscillator.connect(oscillatorGain);
          oscillatorGain.connect(filter);

          oscillator.start(startTime);
          oscillator.stop(startTime + duration);

          return { oscillator, oscillatorGain };
        });

        filter.connect(master);
        master.connect(context.destination);

        activeIncomingRingtoneNodes = oscillators.map((item) => item.oscillator);

        window.setTimeout(() => {
          try {
            oscillators.forEach(({ oscillator, oscillatorGain }) => {
              oscillator.disconnect();
              oscillatorGain.disconnect();
            });

            filter.disconnect();
            master.disconnect();
          } catch (_) {}

          activeIncomingRingtoneNodes = [];
        }, duration * 1000 + 150);
      }

      function waitForIceGatheringComplete(connection, timeout = 3000) {
        if (!connection || connection.iceGatheringState === "complete") {
          return Promise.resolve();
        }

        return new Promise((resolve) => {
          let resolved = false;

          const finish = () => {
            if (resolved) return;

            resolved = true;
            connection.removeEventListener(
              "icegatheringstatechange",
              handleStateChange
            );
            window.clearTimeout(timer);
            resolve();
          };

          const handleStateChange = () => {
            if (connection.iceGatheringState === "complete") {
              finish();
            }
          };

          const timer = window.setTimeout(finish, timeout);

          connection.addEventListener(
            "icegatheringstatechange",
            handleStateChange
          );
        });
      }

      async function addRemoteCandidate(candidateData) {
        if (!candidateData) return;
        const candidate = new RTCIceCandidate(candidateData);
        if (pc && pc.remoteDescription) {
          try {
            await pc.addIceCandidate(candidate);

      async function flushRemoteCandidates() {
        if (!pc || !pc.remoteDescription) return;
        const candidates = pendingRemoteCandidates.splice(0);
        for (const candidate of candidates) {

          } catch (e) {
            console.warn("Delayed ICE candidate add error:", e);
          }
        }
      }

      function newPC() {
        const x = new RTCPeerConnection({
          iceServers: ICE,
          iceCandidatePoolSize: 4,
          bundlePolicy: "balanced",
          rtcpMuxPolicy: "require",
          iceTransportPolicy: "all",
        });

        x.ontrack = async (event) => {
          const audio = $("remoteAudio");
          const stream = event.streams?.[0] || new MediaStream([event.track]);
          audio.srcObject = stream;
          audio.muted = false;
          audio.volume = 1;
          try {
            await audio.play();
          } catch (error) {
            console.warn("Remote audio playback blocked:", error);
          }
        };

        x.onicecandidateerror = (event) => {
          console.warn("ICE candidate error:", event.errorCode, event.errorText);
        };

        x.oniceconnectionstatechange = () => {
          const state = x.iceConnectionState;
          console.log("ICE state:", state);

          if (state === "connected" || state === "completed") {
            clearConnectionTimers();
            stopRingback();
            if (startAt === null) playConnectionSound();
            startDur();
            return;
          }

          if (state === "checking" || state === "new") {
            $("callStatus").textContent = "Соединение…";
            return;
          }

          if (state === "disconnected") {
            $("callStatus").textContent = "Переподключение…";
            clearConnectionTimers();
            disconnectTimer = setTimeout(() => {
              if (x.iceConnectionState === "disconnected") {
                $("callStatus").textContent = "Соединение потеряно";
              }
            }, DISCONNECT_GRACE_PERIOD);
            return;
          }

          if (state === "failed") {
            clearConnectionTimers();
            $("callStatus").textContent = "Не удалось установить соединение";
          }
        };

        x.onconnectionstatechange = () => {
          const state = x.connectionState;
          console.log("Peer state:", state);

          if (state === "connected") {
            clearConnectionTimers();
            stopRingback();
            if (startAt === null) playConnectionSound();
            startDur();
          } else if (state === "connecting" || state === "new") {
            $("callStatus").textContent = "Соединение…";
          } else if (state === "disconnected") {
            $("callStatus").textContent = "Переподключение…";
          } else if (state === "failed") {
            $("callStatus").textContent = "Не удалось установить соединение";

            clearConnectionTimers();
          }
        };

        return x;

          "auth/missing-password": "Введите пароль.",
          "auth/weak-password": "Пароль должен содержать минимум 6 символов.",
          "auth/email-already-in-use": "Этот email уже зарегистрирован. Нажмите «Войти».",
          "auth/invalid-credential": "Неверный email или пароль.",
          "auth/user-not-found": "Аккаунт не найден.",
          "auth/wrong-password": "Неверный пароль.",
          "auth/too-many-requests": "Слишком много попыток. Попробуйте позже.",
          "auth/network-request-failed": "Ошибка сети. Проверьте интернет.",
          "permission-denied": "Firestore запретил доступ. Проверьте Rules.",
          "firestore/permission-denied": "Firestore запретил доступ. Проверьте Rules.",
        };
        return messages[code] || error?.message || "Неизвестная ошибка.";
      }

      function fallbackUsername(user) {
        const emailPart = (user.email || "user")
          .split("@")[0]
          .replace(/[^a-zA-Z1-9_]/g, "")
          .replace(/0/g, "")
          .slice(0, 9) || "user";
        const uidPart = user.uid
          .replace(/[^a-zA-Z1-9]/g, "")
          .replace(/0/g, "")
          .slice(0, 5) || "12345";
        return clean(`${emailPart}_${uidPart}`);
      }

      function randomSuffix() {
        const chars = "abcdefghijklmnopqrstuvwxyz123456789";
        return Array.from({ length: 5 }, () => chars[Math.floor(Math.random() * chars.length)]).join("");
      }

      async function ensureProfile(user, preferredUsername = "") {
        const userRef = doc(db, "users", user.uid);
        const existing = await getDoc(userRef);
        if (existing.exists()) return existing.data();

        const base = clean(preferredUsername) || fallbackUsername(user);

        for (let attempt = 0; attempt < 20; attempt++) {
          const suffix = attempt === 0 ? "" : `_${randomSuffix()}`;
          const candidate = `${base.slice(0, 16 - suffix.length)}${suffix}`.slice(0, 16);
          if (!RE.test(candidate)) continue;

          const usernameRef = doc(db, "usernames", candidate.toLowerCase());

          try {
            await runTransaction(db, async (tx) => {
              const profileSnap = await tx.get(userRef);
              if (profileSnap.exists()) return;

              const usernameSnap = await tx.get(usernameRef);
              if (usernameSnap.exists() && usernameSnap.data().uid !== user.uid) {
                const err = new Error("USERNAME_TAKEN");
                err.code = "USERNAME_TAKEN";
                throw err;
              }

              tx.set(usernameRef, {
                uid: user.uid,
                username: candidate,
                updatedAt: serverTimestamp(),
              });

              tx.set(userRef, {
                uid: user.uid,
                username: candidate,
                usernameLower: candidate.toLowerCase(),
                avatar: "",
                lastSeen: serverTimestamp(),
                createdAt: serverTimestamp(),
                updatedAt: serverTimestamp(),
              });
            });

            const created = await getDoc(userRef);
            if (created.exists()) return created.data();
          } catch (error) {
            if (error?.code === "USERNAME_TAKEN") continue;
            throw error;
          }
        }

        throw new Error("Не удалось создать свободный юзернейм.");
      }

      async function startSession(user, preferredUsername = "") {
        u = user;
        p = await ensureProfile(user, preferredUsername);
        myUI();
        $("authScreen").classList.add("hidden");
        hint($("authHint"), "");
        await beat();
        clearInterval(presenceTimer);
        presenceTimer = setInterval(beat, 3e4);
        listen();
      }

      async function reg() {
        const button = $("registerBtn");
        button.disabled = true;

        try {
          hint($("authHint"), "");

          const email = $("authEmail").value.trim();
          const password = $("authPassword").value;
          const username = clean($("authUsername").value);

          if (!email) throw new Error("Введите email.");
          if (password.length < 6) throw new Error("Пароль должен содержать минимум 6 символов.");
          if (!RE.test(username)) throw new Error("Юзернейм: английские буквы, цифры 1–9 и _, максимум 16 символов.");

          const credential = await createUserWithEmailAndPassword(auth, email, password);
          await startSession(credential.user, username);
        } catch (error) {
          hint($("authHint"), firebaseErrorMessage(error), true);
        } finally {
          button.disabled = false;
        }
      }

      async function login() {
        const button = $("loginBtn");
        button.disabled = true;

        try {
          hint($("authHint"), "");

          const email = $("authEmail").value.trim();
          const password = $("authPassword").value;
          const preferredUsername = clean($("authUsername").value);

          if (!email) throw new Error("Введите email.");
          if (!password) throw new Error("Введите пароль.");

          const credential = await signInWithEmailAndPassword(auth, email, password);
          await startSession(credential.user, preferredUsername);
        } catch (error) {
          hint($("authHint"), firebaseErrorMessage(error), true);
        } finally {
          button.disabled = false;
        }
      }

      onAuthStateChanged(auth, async (user) => {
        u = user;

        if (!user) {
          $("authScreen").classList.remove("hidden");
          inUn?.();
          inUn = null;
          clearInterval(presenceTimer);
          cleanup();
          return;
        }

        if (authBootstrapPromise) return;

        authBootstrapPromise = startSession(
          user,
          clean($("authUsername").value),
        );

        try {
          await authBootstrapPromise;
        } catch (error) {
          $("authScreen").classList.remove("hidden");
          hint($("authHint"), firebaseErrorMessage(error), true);
        } finally {
          authBootstrapPromise = null;
        }
      });
      let td = null;
      $("searchInput").oninput = () => {
        clearTimeout(td);
        td = setTimeout(search, 350);
      };
      $("loginBtn").onclick = () => { playSoftClick(); login(); };
      $("registerBtn").onclick = () => { playSoftClick(); reg(); };
      $("profileBtn").onclick = () => {
        playOpenSound();
        pa = p?.avatar || "";
        myUI();
        hint($("profileHint"), "");
        open($("profileOverlay"));
      };
      $("profileClose").onclick = () => { playCloseSound(); close($("profileOverlay")); };
      $("profileSave").onclick = async () => {
        try {
          await saveProfile($("profileUsername").value, pa);
          playSelectionSound();
          close($("profileOverlay"));
        } catch (e) {
          hint($("profileHint"), e.message, true);
        }
      };
      $("profileUsername").oninput = () => {
        let c = clean($("profileUsername").value);
        $("profileUsername").value = c ? `@${c}` : "";
      };
      $("avatarInput").onchange = () => {
        let f = $("avatarInput").files[0];
        if (!f) return;
        if (f.size > 700 * 1024)
          return hint($("profileHint"), "Выбери фото меньше 700 КБ", true);
        let r = new FileReader();
        r.onload = () => {
          pa = r.result;
          $("profileAvatar").src = pa;
        };
        r.readAsDataURL(f);
      };
      $("settingsBtn").onclick = () => { playOpenSound(); open($("settingsOverlay")); };
      $("settingsClose").onclick = () => { playCloseSound(); close($("settingsOverlay")); };
      $("encryptionSwitch").onclick = () => {
        enc = !enc;
        localStorage.setItem("encryptionEnabled", String(enc));
        playToggleSound(enc);
        settingsUI();
      };
      document.querySelectorAll(".mode").forEach(
        (b) =>
          (b.onclick = () => {
            mode = b.dataset.mode;
            localStorage.setItem("displayMode", mode);
            playSelectionSound();
            settingsUI();
          }),
      );
      $("answerBtn").onclick = () => { playSoftClick(); answer(); };
      $("rejectBtn").onclick = () => { playEndCallSound(); reject(); };
      $("hangupBtn").onclick = hang;
      $("micBtn").onclick = () => {
        muted = !muted;
        ls?.getAudioTracks().forEach((t) => (t.enabled = !muted));
        $("micBtn").classList.toggle("muted", muted);
        playToggleSound(!muted);
      };
      $("speakerBtn").onclick = () => {
        speaker = !speaker;
        $("speakerBtn").classList.toggle("on", speaker);
        playToggleSound(speaker);
        $("remoteAudio").volume = speaker ? 1 : 0.85;
        $("remoteAudio")
          .play()
          .catch(() => {});
      };
      document.querySelectorAll(".overlay").forEach(
        (o) =>
          (o.onclick = (e) => {
            if (e.target === o && o !== $("incomingOverlay")) close(o);
          }),
      );
      document.addEventListener(
        "pointerdown",
        (event) => {
          if (event.target.closest("button, label")) getAudioContext();
        },
        { passive: true },
      );
      settingsUI();
      render(null);
    </script>
  </body>
</html>
