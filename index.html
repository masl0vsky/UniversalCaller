<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no"
    >

    <meta name="theme-color" content="#101010">

    <title>UniversalCaller</title>

    <style>
        :root {
            --background: #101010;
            --surface: #191919;
            --surface-hover: #232323;
            --surface-soft: #242424;
            --border: #292929;

            --text-primary: #f2f2f2;
            --text-secondary: #929292;
            --text-muted: #777777;

            --online: #9fd2ad;
            --offline: #5b5b5b;
            --error: #d98b8b;

            --call-control: #292929;
            --call-control-active: #ededed;
            --call-control-active-text: #111111;

            --hangup: #e53935;
            --hangup-hover: #ef4844;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            background: var(--background);
        }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;

            overflow-x: hidden;

            color: var(--text-primary);

            font-family:
                Inter,
                -apple-system,
                BlinkMacSystemFont,
                "SF Pro Display",
                "SF Pro Text",
                "Segoe UI",
                Roboto,
                Arial,
                sans-serif;
        }

        button,
        input {
            font: inherit;
        }

        button {
            padding: 0;
            border: none;
            outline: none;
            cursor: pointer;
        }

        img {
            -webkit-user-drag: none;
            user-select: none;
        }

        .hidden {
            display: none !important;
        }

        .app {
            width: 100%;
            max-width: 560px;

            min-height: 100vh;
            min-height: 100dvh;

            margin: 0 auto;

            padding:
                max(10px, env(safe-area-inset-top))
                max(12px, env(safe-area-inset-right))
                calc(24px + env(safe-area-inset-bottom))
                max(12px, env(safe-area-inset-left));
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;

            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;

            width: 100%;
            padding-bottom: 14px;

            background: rgba(16, 16, 16, 0.96);

            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .search {
            position: relative;
            flex: 1;
            min-width: 0;
        }

        .search-icon {
            position: absolute;
            top: 50%;
            left: 14px;

            width: 18px;
            height: 18px;

            color: #8b8b8b;

            transform: translateY(-50%);
            pointer-events: none;
        }

        .search-icon circle,
        .search-icon path {
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .search-input {
            display: block;

            width: 100%;
            height: 44px;

            padding: 0 14px 0 41px;

            color: var(--text-primary);
            background: var(--surface);

            border: 1px solid transparent;
            border-radius: 14px;

            outline: none;

            font-size: 14px;

            transition:
                background 0.18s ease,
                border-color 0.18s ease;
        }

        .search-input::placeholder {
            color: var(--text-muted);
            opacity: 1;
        }

        .search-input:focus {
            background: #1c1c1c;
            border-color: #343434;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 0;

            flex-shrink: 0;
        }

        .top-button {
            display: grid;
            place-items: center;

            width: 40px;
            height: 42px;

            color: #eeeeee;
            background: transparent;

            border-radius: 50%;

            transition:
                color 0.18s ease,
                background 0.18s ease,
                transform 0.18s ease;
        }

        .top-button:active {
            transform: scale(0.92);
        }

        .top-button svg {
            display: block;

            width: 24px;
            height: 24px;

            fill: none;
            stroke: currentColor;
            stroke-width: 1.55;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .my-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;

            min-height: 34px;

            color: var(--text-secondary);
            font-size: 12px;
        }

        .my-profile-short {
            display: flex;
            align-items: center;
            gap: 8px;

            min-width: 0;
        }

        .online-dot {
            width: 7px;
            height: 7px;

            flex-shrink: 0;

            background: var(--online);
            border-radius: 50%;
        }

        .mini-avatar {
            width: 24px;
            height: 24px;

            flex-shrink: 0;

            object-fit: cover;

            background: #292929;
            border-radius: 50%;
        }

        .my-username {
            overflow: hidden;

            font-weight: 600;

            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-button {
            color: var(--text-muted);
            background: transparent;

            font-size: 12px;
        }

        .contacts {
            display: flex;
            flex-direction: column;

            border-top: 1px solid var(--border);
        }

        .contact {
            display: flex;
            align-items: center;
            gap: 13px;

            min-height: 72px;
            padding: 9px 4px;

            border-bottom: 1px solid var(--border);
        }

        .avatar-wrapper {
            position: relative;

            width: 50px;
            height: 50px;

            flex-shrink: 0;
        }

        .avatar {
            display: block;

            width: 50px;
            height: 50px;

            object-fit: cover;

            background: #292929;
            border-radius: 50%;
        }

        .presence-dot {
            position: absolute;
            right: 0;
            bottom: 1px;

            width: 11px;
            height: 11px;

            background: var(--offline);

            border: 2px solid var(--background);
            border-radius: 50%;
        }

        .presence-dot.online {
            background: var(--online);
        }

        .contact-info {
            min-width: 0;
            flex: 1;
        }

        .contact-name {
            margin: 0 0 5px;

            overflow: hidden;

            color: var(--text-primary);

            font-size: 15px;
            font-weight: 650;
            line-height: 1.15;

            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .contact-status {
            margin: 0;

            overflow: hidden;

            color: var(--text-secondary);

            font-size: 13px;
            line-height: 1.2;

            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .call-button {
            display: grid;
            place-items: center;

            width: 42px;
            height: 42px;

            flex-shrink: 0;

            color: #d7d7d7;
            background: transparent;

            border-radius: 50%;
        }

        .call-button:active {
            background: var(--surface-hover);
            transform: scale(0.92);
        }

        .call-button svg {
            width: 21px;
            height: 21px;

            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .empty {
            min-height: 320px;

            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;

            padding: 40px 20px;

            color: var(--text-secondary);
            text-align: center;
        }

        .empty-title {
            margin: 0 0 7px;

            color: var(--text-primary);

            font-size: 16px;
            font-weight: 600;
        }

        .empty-text {
            margin: 0;

            color: var(--text-secondary);
            font-size: 14px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;

            display: flex;
            align-items: flex-end;
            justify-content: center;

            padding:
                16px
                max(16px, env(safe-area-inset-right))
                calc(16px + env(safe-area-inset-bottom))
                max(16px, env(safe-area-inset-left));

            visibility: hidden;
            opacity: 0;

            background: rgba(0, 0, 0, 0.66);

            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);

            transition:
                opacity 0.2s ease,
                visibility 0.2s ease;
        }

        .modal-overlay.visible {
            visibility: visible;
            opacity: 1;
        }

        .modal {
            width: 100%;
            max-width: 508px;

            max-height: calc(100dvh - 32px);
            overflow-y: auto;
            overscroll-behavior: contain;

            padding: 10px 18px 22px;

            background: #1a1a1a;

            border: 1px solid #303030;
            border-radius: 24px;

            transform: translateY(24px);

            transition: transform 0.22s ease;
        }

        .modal-overlay.visible .modal {
            transform: translateY(0);
        }

        .modal-handle {
            width: 38px;
            height: 4px;

            margin: 0 auto 22px;

            background: #555555;
            border-radius: 999px;
        }

        .modal-title {
            margin: 0 0 18px;

            font-size: 20px;
            font-weight: 650;
        }

        .modal-profile {
            display: flex;
            align-items: center;
            flex-direction: column;

            padding: 4px 0 20px;

            text-align: center;
        }

        .field {
            width: 100%;
            height: 48px;

            padding: 0 14px;
            margin-bottom: 10px;

            color: var(--text-primary);
            background: #222222;

            border: 1px solid #333333;
            border-radius: 14px;

            outline: none;

            font-size: 15px;
        }

        .field:focus {
            background: #242424;
            border-color: #555555;
        }

        .hint {
            min-height: 18px;

            margin: 4px 0 12px;

            color: var(--text-secondary);

            font-size: 12px;
            line-height: 1.4;
        }

        .hint.error {
            color: var(--error);
        }

        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .modal-button {
            min-height: 50px;

            padding: 0 16px;

            color: var(--text-primary);
            background: #242424;

            border-radius: 14px;

            font-size: 14px;
            font-weight: 600;
        }

        .modal-button:active {
            transform: scale(0.97);
        }

        .modal-button.primary {
            color: #151515;
            background: #ededed;
        }

        .modal-button.danger {
            color: #ffffff;
            background: var(--hangup);
        }

        .auth-screen {
            position: fixed;
            inset: 0;
            z-index: 300;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 22px;

            background:
                radial-gradient(
                    circle at 50% 25%,
                    rgba(255, 255, 255, 0.05),
                    transparent 35%
                ),
                #101010;
        }

        .auth-card {
            width: 100%;
            max-width: 390px;

            padding: 26px;

            background: #191919;

            border: 1px solid #2e2e2e;
            border-radius: 24px;
        }

        .auth-title {
            margin: 0 0 8px;

            font-size: 25px;
            font-weight: 700;
        }

        .auth-subtitle {
            margin: 0 0 20px;

            color: var(--text-secondary);
            font-size: 14px;
        }

        .profile-avatar-editor {
            position: relative;

            width: 96px;
            height: 96px;

            margin: 0 auto 20px;
        }

        .profile-avatar {
            width: 96px;
            height: 96px;

            object-fit: cover;

            background: #252525;
            border-radius: 50%;
        }

        .avatar-change-button {
            position: absolute;
            right: -2px;
            bottom: -2px;

            display: grid;
            place-items: center;

            width: 34px;
            height: 34px;

            color: #111111;
            background: #ededed;

            border: 3px solid #1a1a1a;
            border-radius: 50%;

            cursor: pointer;
        }

        .avatar-change-button svg {
            width: 17px;
            height: 17px;

            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .avatar-file-input {
            display: none;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;

            min-height: 58px;

            border-bottom: 1px solid var(--border);
        }

        .switch {
            position: relative;

            width: 44px;
            height: 26px;

            flex-shrink: 0;

            background: #363636;
            border-radius: 999px;
        }

        .switch::after {
            content: "";

            position: absolute;
            top: 3px;
            left: 3px;

            width: 20px;
            height: 20px;

            background: #bfbfbf;
            border-radius: 50%;

            transition:
                left 0.2s ease,
                background 0.2s ease;
        }

        .switch.active {
            background: #e6e6e6;
        }

        .switch.active::after {
            left: 21px;
            background: #181818;
        }

        .encryption-options {
            display: none;
        }

        .encryption-options.visible {
            display: block;
        }

        .display-setting {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;

            min-height: 68px;

            border-bottom: 1px solid var(--border);
        }

        .display-options {
            display: flex;
            align-items: center;

            padding: 3px;

            background: #242424;
            border-radius: 11px;
        }

        .display-option {
            min-height: 34px;

            padding: 0 11px;

            color: var(--text-secondary);
            background: transparent;

            border-radius: 8px;

            font-size: 12px;
            white-space: nowrap;
        }

        .display-option.active {
            color: #151515;
            background: #ededed;
        }

        .incoming-card {
            text-align: center;
        }

        .incoming-avatar {
            width: 94px;
            height: 94px;

            object-fit: cover;

            background: #252525;
            border-radius: 50%;
        }

        .incoming-title {
            margin: 15px 0 6px;

            font-size: 21px;
            font-weight: 650;
        }

        .incoming-username {
            margin: 0 0 20px;

            color: var(--text-secondary);
        }

        .call-screen {
            position: fixed;
            inset: 0;
            z-index: 220;

            display: flex;
            align-items: center;
            flex-direction: column;

            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;

            visibility: hidden;
            opacity: 0;

            padding:
                max(18px, env(safe-area-inset-top))
                max(20px, env(safe-area-inset-right))
                calc(30px + env(safe-area-inset-bottom))
                max(20px, env(safe-area-inset-left));

            background:
                radial-gradient(
                    circle at 50% 28%,
                    rgba(255, 255, 255, 0.035),
                    transparent 34%
                ),
                #101010;

            transition:
                opacity 0.22s ease,
                visibility 0.22s ease;
        }

        .call-screen.visible {
            visibility: visible;
            opacity: 1;
        }

        .call-verification {
            position: absolute;
            top: max(18px, env(safe-area-inset-top));
            left: 50%;

            display: none;
            align-items: center;
            justify-content: center;

            min-height: 42px;
            max-width: calc(100% - 40px);

            padding: 7px 14px;

            color: #eeeeee;
            background: rgba(34, 34, 34, 0.82);

            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 14px;

            transform: translateX(-50%);

            user-select: none;
            white-space: nowrap;
        }

        .call-verification.visible {
            display: flex;
        }

        .call-verification.emoji-mode {
            gap: 5px;

            font-size: 22px;
            line-height: 1;
        }

        .call-verification.code-mode {
            font-size: 17px;
            font-weight: 650;
            letter-spacing: 0.22em;

            padding-left: 18px;
        }

        .call-contact {
            display: flex;
            align-items: center;
            flex-direction: column;

            width: 100%;
            max-width: 420px;

            margin-top: clamp(88px, 14vh, 145px);

            text-align: center;
        }

        .call-avatar {
            width: clamp(104px, 29vw, 128px);
            height: clamp(104px, 29vw, 128px);

            margin-bottom: 24px;

            object-fit: cover;

            background: #252525;
            border-radius: 50%;
        }

        .call-name {
            max-width: 100%;

            margin: 0 0 10px;

            overflow: hidden;

            font-size: clamp(23px, 6.5vw, 28px);
            font-weight: 600;

            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .call-status {
            min-height: 20px;
            margin: 0;

            color: var(--text-secondary);

            font-size: 15px;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
        }

        .call-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(14px, 4.5vw, 21px);

            width: 100%;
            max-width: 430px;

            margin-top: auto;
        }

        .control-button {
            position: relative;

            display: grid;
            place-items: center;

            width: clamp(58px, 17vw, 66px);
            height: clamp(58px, 17vw, 66px);

            flex-shrink: 0;

            color: var(--text-primary);
            background: var(--call-control);

            border-radius: 50%;
        }

        .control-button svg {
            width: 27px;
            height: 27px;

            overflow: visible;

            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .microphone-button .microphone-slash {
            opacity: 0;
            stroke-width: 2.3;
        }

        .microphone-button.muted {
            color: #111111;
            background: #ededed;
        }

        .microphone-button.muted .microphone-slash {
            opacity: 1;
        }

        .speaker-button.active {
            color: #111111;
            background: #ededed;
        }

        .end-call-button {
            color: #ffffff;
            background: var(--hangup);
        }

        .end-call-button svg {
            position: relative;
            top: -1px;

            width: 30px;
            height: 30px;

            stroke-width: 2.05;
        }

        audio {
            display: none;
        }

        @media (max-width: 370px) {
            .app {
                padding-right: 8px;
                padding-left: 8px;
            }

            .top-button {
                width: 36px;
            }

            .display-option {
                padding: 0 8px;
                font-size: 11px;
            }

            .call-controls {
                gap: 12px;
            }
        }

        @media (min-width: 561px) {
            body {
                display: flex;
                justify-content: center;
            }

            .app {
                border-right: 1px solid var(--border);
                border-left: 1px solid var(--border);
            }
        }
    </style>
</head>

<body>
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h1 class="auth-title">UniversalCaller</h1>
            <p class="auth-subtitle">Войди или создай аккаунт.</p>

            <input
                id="authEmail"
                class="field"
                type="email"
                placeholder="Email"
                autocomplete="email"
            >

            <input
                id="authPassword"
                class="field"
                type="password"
                placeholder="Пароль — минимум 6 символов"
                autocomplete="current-password"
            >

            <input
                id="authUsername"
                class="field"
                type="text"
                placeholder="@username при регистрации"
                maxlength="16"
                autocomplete="off"
                autocapitalize="none"
                spellcheck="false"
            >

            <div id="authHint" class="hint"></div>

            <div class="button-row">
                <button id="loginButton" class="modal-button" type="button">
                    Войти
                </button>

                <button id="registerButton" class="modal-button primary" type="button">
                    Регистрация
                </button>
            </div>
        </div>
    </div>

    <main class="app">
        <header class="topbar">
            <div class="search">
                <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="10.5" cy="10.5" r="5.8"></circle>
                    <path d="M15 15 20 20"></path>
                </svg>

                <input
                    id="searchInput"
                    class="search-input"
                    type="search"
                    placeholder="Поиск по @username"
                    autocomplete="off"
                    aria-label="Поиск по username"
                >
            </div>

            <div class="top-actions">
                <button
                    id="settingsButton"
                    class="top-button"
                    type="button"
                    aria-label="Настройки"
                >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path
                            d="
                                M9.55 2.7
                                H14.45
                                L15 4.85
                                C15.48 5.02 15.94 5.27 16.35 5.55
                                L18.5 4.95
                                L20.95 9.05
                                L19.35 10.6
                                C19.4 11.06 19.4 11.54 19.35 12
                                C19.4 12.46 19.4 12.94 19.35 13.4
                                L20.95 14.95
                                L18.5 19.05
                                L16.35 18.45
                                C15.94 18.73 15.48 18.98 15 19.15
                                L14.45 21.3
                                H9.55
                                L9 19.15
                                C8.52 18.98 8.06 18.73 7.65 18.45
                                L5.5 19.05
                                L3.05 14.95
                                L4.65 13.4
                                C4.6 12.94 4.6 12.46 4.65 12
                                C4.6 11.54 4.6 11.06 4.65 10.6
                                L3.05 9.05
                                L5.5 4.95
                                L7.65 5.55
                                C8.06 5.27 8.52 5.02 9 4.85
                                Z
                            "
                        ></path>
                        <circle cx="12" cy="12" r="3.1"></circle>
                    </svg>
                </button>

                <button
                    id="profileButton"
                    class="top-button"
                    type="button"
                    aria-label="Профиль"
                >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="7.5" r="3.4"></circle>
                        <path d="M5.5 20c.55-4.1 3-6.2 6.5-6.2s5.95 2.1 6.5 6.2"></path>
                    </svg>
                </button>
            </div>
        </header>

        <div class="my-panel">
            <div class="my-profile-short">
                <span class="online-dot"></span>
                <img id="miniAvatar" class="mini-avatar" src="" alt="">
                <span id="myUsername" class="my-username">Подключение...</span>
            </div>

        function formatCallDuration(totalSeconds) {
            const hours = Math.floor(totalSeconds / 3600);

            const minutes =
                Math.floor((totalSeconds % 3600) / 60);

            const seconds =
                totalSeconds % 60;

            const formattedMinutes =
                String(minutes).padStart(2, "0");

            const formattedSeconds =
                String(seconds).padStart(2, "0");

            if (hours > 0) {
                return (
                    String(hours).padStart(2, "0") +
                    ":" +
                    formattedMinutes +
                    ":" +
                    formattedSeconds
                );
            }

            return formattedMinutes + ":" + formattedSeconds;
        }

        function updateCallDuration() {
            if (callStartedAt === null) {
                return;
            }

            const elapsedSeconds =
                Math.floor((Date.now() - callStartedAt) / 1000);

            $("callStatus").textContent =
                formatCallDuration(elapsedSeconds);
        }

        function startCallDuration() {
            stopCallDuration();

            callStartedAt = Date.now();

            updateCallDuration();

        async function reserveUsername(uid, username, oldUsername = "") {
            const lowerUsername = username.toLowerCase();

            await runTransaction(db, async (transaction) => {
                const newUsernameRef =
                    doc(db, "usernames", lowerUsername);

                const newUsernameSnapshot =
                    await transaction.get(newUsernameRef);

                if (
                    newUsernameSnapshot.exists() &&
                    newUsernameSnapshot.data().uid !== uid
                ) {
                    throw new Error("Этот юзернейм уже занят");
                }

                transaction.set(newUsernameRef, {
                    uid: uid,
                    username: username,
                    updatedAt: serverTimestamp()
                });

                if (
                    oldUsername &&
                    oldUsername.toLowerCase() !== lowerUsername
                ) {
                    const oldUsernameRef =
                        doc(db, "usernames", oldUsername.toLowerCase());

                    const oldUsernameSnapshot =
                        await transaction.get(oldUsernameRef);

                    if (
                        oldUsernameSnapshot.exists() &&
                        oldUsernameSnapshot.data().uid === uid
                    ) {
                        transaction.delete(oldUsernameRef);
                    }
                }
            });
        }

        async function saveProfile(usernameValue, avatarValue) {
            const username =
                cleanUsername(usernameValue);

            if (!USERNAME_PATTERN.test(username)) {
                throw new Error(
                    "Юзернейм: английские буквы, цифры 1–9 и _, максимум 16 символов"
                );

            await reserveUsername(
                currentUser.uid,
                username,
                myProfile?.username || ""
            );

            await setDoc(
                doc(db, "users", currentUser.uid),
                {
                    uid: currentUser.uid,
                    username: username,
                    usernameLower: username.toLowerCase(),
                    avatar: avatarValue || "",
                    lastSeen: serverTimestamp(),
                    updatedAt: serverTimestamp()

                {
                    merge: true
                }
            );

            const profileSnapshot =
                await getDoc(doc(db, "users", currentUser.uid));

            myProfile = profileSnapshot.data();

            updateMyUi();
        }

        function renderFoundUser(profile) {

        async function getMicrophoneStream() {
            if (localStream) {
                return localStream;
            }

            localStream =
                await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    },
                    video: false
                });

            return localStream;
        }

        function createPeerConnection() {
            const peer =
                new RTCPeerConnection({
                    iceServers: ICE_SERVERS
                });

            peer.ontrack = (event) => {
                $("remoteAudio").srcObject =
                    event.streams[0];

                $("remoteAudio")
                    .play()
                    .catch(() => {});
            };

            peer.onconnectionstatechange = () => {
                if (peer.connectionState === "connected") {
                    startCallDuration();
                }

                if (
                    peer.connectionState === "failed" ||
                    peer.connectionState === "disconnected"
                ) {
                    $("callStatus").textContent =
                        "Соединение потеряно";
                }
            };

            return peer;
        }

        async function startOutgoingCall(targetProfile) {
            try {
                if (currentCallRef) {
                    return;
                }

                showCallScreen(targetProfile, "Вызов...");

                const stream =
                    await getMicrophoneStream();

                peerConnection =
                    createPeerConnection();

                stream
                    .getTracks()
                    .forEach((track) => {
                        peerConnection.addTrack(track, stream);
                    });

                currentCallRef =
                    doc(collection(db, "calls"));

                const callerCandidates =
                    collection(currentCallRef, "callerCandidates");

                const calleeCandidates =
                    collection(currentCallRef, "calleeCandidates");

                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        addDoc(
                            callerCandidates,
                            event.candidate.toJSON()
                        );
                    }
                };

                candidateUnsubscribe =
                    onSnapshot(calleeCandidates, (snapshot) => {
                        snapshot.docChanges().forEach((change) => {
                            if (change.type === "added") {
                                peerConnection
                                    ?.addIceCandidate(
                                        new RTCIceCandidate(change.doc.data())
                                    )
                                    .catch(() => {});
                            }
                        });
                    });

                const offer =
                    await peerConnection.createOffer();

                await peerConnection.setLocalDescription(offer);

                await setDoc(currentCallRef, {
                    callerId: currentUser.uid,
                    calleeId: targetProfile.uid,

                    callerUsername: myProfile.username,
                    callerAvatar: myProfile.avatar || "",

                    calleeUsername: targetProfile.username,
                    calleeAvatar: targetProfile.avatar || "",

                    status: "ringing",
                    createdAt: serverTimestamp(),

                    offer: {
                        type: offer.type,
                        sdp: offer.sdp
                    }
                });

                callUnsubscribe =
                    onSnapshot(currentCallRef, async (snapshot) => {
                        if (!snapshot.exists()) {
                            return;
                        }

                        const callData =
                            snapshot.data();

                        if (
                            callData.answer &&
                            !peerConnection.currentRemoteDescription
                        ) {
                            await peerConnection.setRemoteDescription(
                                new RTCSessionDescription(callData.answer)
                            );

                            $("callStatus").textContent =
                                "Соединение...";
                        }

                        if (callData.status === "rejected") {
                            $("callStatus").textContent =
                                "Вызов отклонён";

                            window.setTimeout(cleanupCall, 700);
                        }

                        if (callData.status === "ended") {
                            cleanupCall();
                        }
                    });
            } catch (error) {
                alert("Не удалось начать звонок: " + error.message);
                cleanupCall();
            }
        }

                peerConnection.onicecandidate = (event) => {

                        addDoc(
                            calleeCandidates,
                            event.candidate.toJSON()
                        );
                    }
                };

                candidateUnsubscribe =
                    onSnapshot(callerCandidates, (snapshot) => {
                        snapshot.docChanges().forEach((change) => {
                            if (change.type === "added") {
                                peerConnection
                                    ?.addIceCandidate(
                                        new RTCIceCandidate(change.doc.data())
                                    )
                                    .catch(() => {});
                            }
                        });
                    });

                await peerConnection.setRemoteDescription(
                    new RTCSessionDescription(callData.offer)
                );

                const answer =
                    await peerConnection.createAnswer();

                await peerConnection.setLocalDescription(answer);

                await updateDoc(currentCallRef, {
                    answer: {
                        type: answer.type,
                        sdp: answer.sdp
                    },
                    status: "accepted",
                    answeredAt: serverTimestamp()
                });

                callUnsubscribe =
                    onSnapshot(currentCallRef, (snapshot) => {
                        if (!snapshot.exists()) {
                            cleanupCall();
                            return;
                        }

                        if (snapshot.data().status === "ended") {
                            cleanupCall();
                        }
                    });

                currentIncomingCall = null;
            } catch (error) {
                alert("Не удалось принять звонок: " + error.message);
                cleanupCall();
            }
        }

        async function rejectIncomingCall() {
            if (!currentIncomingCall) {
                return;
            }

            await updateDoc(
                doc(db, "calls", currentIncomingCall.id),
                {
                    status: "rejected",
                    endedAt: serverTimestamp()
                }
            ).catch(() => {});

            currentIncomingCall = null;

            closeModal($("incomingModal"));
        }

        async function endCall() {
            if (currentCallRef) {
                await updateDoc(currentCallRef, {
                    status: "ended",
                    endedAt: serverTimestamp()
                }).catch(() => {});
            }

            cleanupCall();
        }

        function cleanupCall() {
            stopCallDuration();

            callUnsubscribe?.();
            candidateUnsubscribe?.();

            callUnsubscribe = null;
            candidateUnsubscribe = null;

            peerConnection?.close();
            peerConnection = null;

            localStream
                ?.getTracks()
                .forEach((track) => {
                    track.stop();
                });

            localStream = null;

            $("remoteAudio").srcObject = null;

            currentCallRef = null;
            currentIncomingCall = null;

            $("callScreen").classList.remove("visible");
            $("incomingModal").classList.remove("visible");

            $("callVerification").classList.remove(
                "visible",
                "emoji-mode",
                "code-mode"
            );

            document.body.style.overflow = "";

            microphoneMuted = false;
            speakerEnabled = false;

            $("microphoneButton").classList.remove("muted");
            $("speakerButton").classList.remove("active");
        }

        function listenIncomingCalls() {
            incomingUnsubscribe?.();

            const incomingQuery =
                query(
                    collection(db, "calls"),
                    where("calleeId", "==", currentUser.uid),
                    where("status", "==", "ringing"),
                    limit(1)
                );

            incomingUnsubscribe =
                onSnapshot(incomingQuery, (snapshot) => {
                    if (
                        currentCallRef ||
                        currentIncomingCall ||
                        snapshot.empty
                    ) {
                        return;
                    }

                    const callDocument =
                        snapshot.docs[0];

                    currentIncomingCall = {
                        id: callDocument.id,
                        data: callDocument.data()
                    };

                    $("incomingAvatar").src =
                        currentIncomingCall.data.callerAvatar || DEFAULT_AVATAR;

                    $("incomingUsername").textContent =
                        "@" + currentIncomingCall.data.callerUsername;

                    openModal($("incomingModal"));
                });
        }

        async function registerUser() {
            try {
                const username =
                    cleanUsername($("authUsername").value);

                if (!USERNAME_PATTERN.test(username)) {
                    throw new Error("Укажите корректный юзернейм");
                }

                const credential =
                    await createUserWithEmailAndPassword(
                        auth,
                        $("authEmail").value.trim(),
                        $("authPassword").value
                    );

                currentUser =
                    credential.user;

                await saveProfile(username, "");
            } catch (error) {
                showHint(
                    $("authHint"),
                    error.message,
                    true
                );
            }
        }

        async function loginUser() {
            try {
                await signInWithEmailAndPassword(
                    auth,
                    $("authEmail").value.trim(),
                    $("authPassword").value
                );
            } catch (error) {
                showHint(
                    $("authHint"),
                    "Не удалось войти: " + error.message,
                    true
                );
            }
        }

        onAuthStateChanged(auth, async (user) => {
            currentUser =
                user;

            if (!user) {
                $("authScreen").classList.remove("hidden");

                incomingUnsubscribe?.();

                clearInterval(presenceTimer);

                cleanupCall();

                return;
            }

            $("authScreen").classList.add("hidden");

            const profileSnapshot =
                await getDoc(doc(db, "users", user.uid));

            myProfile =
                profileSnapshot.exists()
                    ? profileSnapshot.data()
                    : null;

            if (!myProfile) {
                await signOut(auth);
                return;
            }

            updateMyUi();

            await sendHeartbeat();

            clearInterval(presenceTimer);

            presenceTimer =
                window.setInterval(sendHeartbeat, 30000);

            listenIncomingCalls();
        });

        let searchDebounce = null;

        $("searchInput").addEventListener("input", () => {
            window.clearTimeout(searchDebounce);

            searchDebounce =
                window.setTimeout(searchUser, 350);
        });

        $("loginButton").addEventListener("click", loginUser);
        $("registerButton").addEventListener("click", registerUser);

        $("logoutButton").addEventListener("click", () => {
            signOut(auth);
        });

        $("profileButton").addEventListener("click", () => {
            pendingAvatar =
                myProfile?.avatar || "";

            updateMyUi();

            showHint($("profileHint"), "");

            openModal($("profileModal"));
        });

        $("closeProfileButton").addEventListener("click", () => {
            closeModal($("profileModal"));
        });

        $("saveProfileButton").addEventListener("click", async () => {
            try {
                await saveProfile(
                    $("profileUsernameInput").value,
                    pendingAvatar
                );

                closeModal($("profileModal"));
            } catch (error) {
                showHint(
                    $("profileHint"),
                    error.message,
                    true
                );
            }
        });

        $("profileUsernameInput").addEventListener("input", () => {
            const username =
                cleanUsername($("profileUsernameInput").value);

            $("profileUsernameInput").value =
                username ? "@" + username : "";
        });

        $("avatarFileInput").addEventListener("change", () => {
            const file =
                $("avatarFileInput").files[0];

            if (!file) {
                return;
            }

            if (file.size > 700 * 1024) {
                showHint(
                    $("profileHint"),
                    "Выбери фото меньше 700 КБ",
                    true
                );

                return;
            }

            const reader =
                new FileReader();

            reader.onload = () => {
                pendingAvatar =
                    reader.result;

                $("profileAvatar").src =
                    pendingAvatar;
            };

            reader.readAsDataURL(file);
        });

        $("settingsButton").addEventListener("click", () => {
            openModal($("settingsModal"));
        });

        $("closeSettingsButton").addEventListener("click", () => {
            closeModal($("settingsModal"));
        });

        $("encryptionSwitch").addEventListener("click", () => {
            encryptionEnabled =
                !encryptionEnabled;

            localStorage.setItem(
                "encryptionEnabled",
                String(encryptionEnabled)
            );

            updateSettingsUi();
        });

        document
            .querySelectorAll(".display-option")
            .forEach((button) => {
                button.addEventListener("click", () => {
                    displayMode =
                        button.dataset.displayMode;

                    localStorage.setItem(
                        "displayMode",
                        displayMode
                    );

                    updateSettingsUi();
                });
            });

        $("answerCallButton").addEventListener("click", answerIncomingCall);
        $("rejectCallButton").addEventListener("click", rejectIncomingCall);
        $("endCallButton").addEventListener("click", endCall);

        $("microphoneButton").addEventListener("click", () => {
            microphoneMuted =
                !microphoneMuted;

            localStream
                ?.getAudioTracks()
                .forEach((track) => {
                    track.enabled =
                        !microphoneMuted;
                });

            $("microphoneButton").classList.toggle(
                "muted",
                microphoneMuted
            );
        });

        $("speakerButton").addEventListener("click", () => {
            speakerEnabled =
                !speakerEnabled;

            $("speakerButton").classList.toggle(
                "active",
                speakerEnabled
            );

            $("remoteAudio").volume =
                speakerEnabled ? 1 : 0.85;

            $("remoteAudio")
                .play()
                .catch(() => {});
        });

        document
            .querySelectorAll(".modal-overlay")
            .forEach((overlay) => {
                overlay.addEventListener("click", (event) => {
                    if (
                        event.target === overlay &&
                        overlay !== $("incomingModal")
                    ) {
                        closeModal(overlay);
                    }
                });
            });

        updateSettingsUi();
        renderFoundUser(null);
    </script>
</body>
</html>
