<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#101010">
  <title>UniversalCaller Messenger</title>

  <style>
    :root {
      --bg: #101010;
      --panel: #171717;
      --panel2: #1d1d1d;
      --panel3: #232323;
      --line: #2a2a2a;
      --text: #f2f2f2;
      --muted: #8d8d8d;
      --soft: #6f6f6f;
      --white: #eeeeee;
      --danger: #e53935;
      --ok: #9fd2ad;
      --bubble-me: #eeeeee;
      --bubble-me-text: #111111;
      --bubble-other: #222222;
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      padding: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }

    img,
    video {
      user-select: none;
      -webkit-user-drag: none;
    }

    .hidden {
      display: none !important;
    }

    .app {
      width: 100%;
      max-width: 560px;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      padding:
        max(10px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        calc(20px + env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
      background: var(--bg);
    }

    @media (min-width: 561px) {
      body {
        display: flex;
        justify-content: center;
      }

      .app {
        border-left: 1px solid #202020;
        border-right: 1px solid #202020;
      }
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      background: rgba(16, 16, 16, 0.96);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .search {
      position: relative;
      flex: 1;
      min-width: 0;
    }

    .search svg {
      position: absolute;
      top: 50%;
      left: 14px;
      width: 18px;
      height: 18px;
      color: #8b8b8b;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search svg * {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .search input {
      width: 100%;
      height: 44px;
      padding: 0 14px 0 41px;
      color: var(--text);
      background: var(--panel);
      border: 1px solid transparent;
      border-radius: 14px;
      outline: 0;
      font-size: 14px;
    }

    .search input::placeholder {
      color: #777777;
    }

    .search input:focus {
      background: #1b1b1b;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 40px;
      height: 42px;
      border-radius: 50%;
      color: #eeeeee;
      flex: 0 0 auto;
    }

    .icon-button:active {
      transform: scale(0.93);
      background: #1e1e1e;
    }

    .icon-button svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.55;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 2px;
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 58px;
      padding: 8px 8px;
      background: var(--panel);
      border: 0;
      border-radius: 18px;
      box-shadow: none;
      transition: transform .16s ease, background .16s ease;
    }

    .user-card:active {
      transform: scale(0.985);
      background: var(--panel2);
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: #292929;
      flex: 0 0 auto;
    }

    .default-avatar {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: transparent;
      flex: 0 0 auto;
    }

    .default-avatar svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .user-card-name {
      min-width: 0;
      flex: 1;
      color: var(--text);
      font-size: 14px;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      min-height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--soft);
      text-align: center;
      font-size: 14px;
      padding: 40px 24px;
    }

    .auth-screen {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: radial-gradient(circle at 50% 26%, rgba(255,255,255,.045), transparent 34%), var(--bg);
    }

    .auth-card {
      width: 100%;
      max-width: 390px;
      padding: 22px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid #2b2b2b;
      box-shadow: var(--shadow);
    }

    .field {
      width: 100%;
      height: 48px;
      margin-bottom: 10px;
      padding: 0 14px;
      color: var(--text);
      background: #222222;
      border: 1px solid #333333;
      border-radius: 14px;
      outline: 0;
      font-size: 15px;
    }

    .field:focus {
      border-color: #4a4a4a;
      background: #242424;
    }

    .hint {
      min-height: 18px;
      margin: 4px 0 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .hint.error {
      color: #e1a0a0;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      min-height: 50px;
      padding: 0 16px;
      border-radius: 14px;
      background: #252525;
      color: var(--text);
      font-weight: 650;
      font-size: 14px;
    }

    .btn.primary {
      background: var(--white);
      color: #151515;
    }

    .btn:active {
      transform: scale(.97);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding:
        16px
        max(16px, env(safe-area-inset-right))
        calc(16px + env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
      visibility: hidden;
      opacity: 0;
      background: rgba(0,0,0,.66);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: opacity .2s ease, visibility .2s ease;
    }

    .modal-overlay.visible {
      visibility: visible;
      opacity: 1;
    }

    .modal {
      width: 100%;
      max-width: 508px;
      max-height: calc(100dvh - 32px);
      overflow-y: auto;
      padding: 10px 18px 22px;
      background: #1a1a1a;
      border: 1px solid #303030;
      border-radius: 24px;
      transform: translateY(24px);
      transition: transform .22s ease;
    }

    .modal-overlay.visible .modal {
      transform: translateY(0);
    }

    .handle {
      width: 38px;
      height: 4px;
      margin: 0 auto 22px;
      border-radius: 999px;
      background: #555555;
    }

    .profile-editor {
      display: flex;
      align-items: center;
      flex-direction: column;
    }

    .profile-avatar-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      margin-bottom: 20px;
    }

    .profile-avatar-wrap img,
    .profile-avatar-wrap .default-avatar {
      width: 96px;
      height: 96px;
    }

    .pick-avatar {
      position: absolute;
      right: -2px;
      bottom: -2px;
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      background: var(--white);
      color: #111111;
      border: 3px solid #1a1a1a;
      border-radius: 50%;
      cursor: pointer;
    }

    .pick-avatar svg {
      width: 17px;
      height: 17px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .settings-title {
      margin: 0 0 18px;
      font-size: 20px;
      font-weight: 700;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 58px;
    }

    .switch {
      position: relative;
      width: 44px;
      height: 26px;
      border-radius: 999px;
      background: #363636;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #bfbfbf;
      transition: left .2s ease, background .2s ease;
    }

    .switch.active {
      background: var(--white);
    }

    .switch.active::after {
      left: 21px;
      background: #181818;
    }

    .chat-screen {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: flex;
      flex-direction: column;
      visibility: hidden;
      opacity: 0;
      background: var(--bg);
      transition: opacity .18s ease, visibility .18s ease;
    }

    .chat-screen.visible {
      visibility: visible;
      opacity: 1;
    }

    .chat-shell {
      width: 100%;
      max-width: 560px;
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    @media (min-width: 561px) {
      .chat-shell {
        border-left: 1px solid #202020;
        border-right: 1px solid #202020;
      }
    }

    .chat-header {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 6px;
      min-height: calc(62px + env(safe-area-inset-top));
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        10px
        max(8px, env(safe-area-inset-left));
      background: rgba(16,16,16,.96);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .back-button,
    .chat-header-avatar-button {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      color: var(--white);
    }

    .chat-header-avatar-button {
      overflow: hidden;
    }

    .chat-header-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      background: #292929;
    }

    .chat-header-avatar-button .default-avatar {
      width: 34px;
      height: 34px;
    }

    .back-button:active,
    .chat-header-avatar-button:active {
      background: #1e1e1e;
      transform: scale(.94);
    }

    .back-button svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chat-user {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-user-text {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .chat-username {
      max-width: 190px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.15;
    }

    .chat-status {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.1;
      min-height: 13px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 12px max(12px, env(safe-area-inset-right)) 10px max(12px, env(safe-area-inset-left));
      display: flex;
      flex-direction: column;
      gap: 8px;
      overscroll-behavior: contain;
    }

    .messages::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .message-row {
      display: flex;
      width: 100%;
    }

    .message-row.me {
      justify-content: flex-end;
    }

    .message-row.other {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(78%, 390px);
      padding: 9px 10px 7px;
      border-radius: 18px;
      background: var(--bubble-other);
      color: var(--text);
      overflow: hidden;
    }

    .message-row.me .bubble {
      background: var(--bubble-me);
      color: var(--bubble-me-text);
      border-bottom-right-radius: 6px;
    }

    .message-row.other .bubble {
      border-bottom-left-radius: 6px;
    }

    .bubble-text {
      display: inline;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 15px;
      line-height: 1.38;
    }

    .bubble-media {
      display: block;
      width: 100%;
      max-width: 250px;
      max-height: 310px;
      border-radius: 14px;
      object-fit: cover;
      margin-bottom: 6px;
      background: #111111;
    }

    .bubble video.bubble-media {
      object-fit: contain;
    }

    .meta {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      margin-left: 7px;
      transform: translateY(2px);
      color: rgba(255,255,255,.48);
      font-size: 11px;
      line-height: 1;
      user-select: none;
    }

    .message-row.me .meta {
      color: rgba(0,0,0,.48);
    }

    .checks {
      min-width: 22px;
      display: inline-flex;
      justify-content: flex-end;
      font-weight: 800;
      letter-spacing: -4px;
      transform: translateX(-2px);
    }

    .composer-wrap {
      padding:
        8px
        max(10px, env(safe-area-inset-right))
        calc(10px + env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      background: rgba(16,16,16,.96);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .composer {
      min-height: 48px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 6px;
      border-radius: 18px;
      background: var(--panel);
    }

    .plus-button,
    .send-button {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .plus-button {
      color: #a6a6a6;
    }

    .plus-button:active {
      background: #242424;
    }

    .plus-button svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
    }

    .send-button {
      background: var(--white);
      color: #111111;
      margin-left: 2px;
    }

    .send-button:disabled {
      opacity: .38;
    }

    .send-button svg {
      width: 21px;
      height: 21px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .message-input {
      flex: 1;
      min-height: 36px;
      max-height: 116px;
      padding: 8px 2px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      line-height: 1.3;
    }

    .message-input::placeholder {
      color: #777777;
    }

    .attachment-preview {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      padding: 8px 10px;
      border-radius: 14px;
      background: #1b1b1b;
      color: var(--muted);
      font-size: 12px;
    }

    .attachment-preview.visible {
      display: flex;
    }

    .attachment-preview button {
      margin-left: auto;
      color: var(--white);
      font-size: 18px;
      line-height: 1;
    }

    @media (max-width: 370px) {
      .app {
        padding-left: 8px;
        padding-right: 8px;
      }

      .icon-button {
        width: 36px;
      }

      .chat-username {
        max-width: 150px;
      }
    }

    /* Компактные диалоги и результаты поиска */
    .user-card,
    .chat-list-item {
      gap: 5px !important;
    }

    .user-card {
      min-height: 50px !important;
      padding: 6px 7px !important;
    }

    .user-card .avatar,
    .user-card .default-avatar,
    .chat-list-avatar,
    .chat-list-item .default-avatar {
      width: 34px !important;
      height: 34px !important;
      flex-basis: 34px !important;
    }

    .user-card-name,
    .chat-list-text {
      margin-left: 0 !important;
    }

    .checks {
      min-width: auto !important;
      margin-left: 3px;
      letter-spacing: -3px;
      transform: none !important;
    }

    .reply-quote {
      margin-bottom: 6px;
      padding: 5px 8px;
      border-left: 2px solid currentColor;
      border-radius: 7px;
      background: rgba(255,255,255,.065);
      opacity: .78;
      font-size: 12px;
      line-height: 1.25;
      overflow: hidden;
    }

    .message-row.me .reply-quote {
      background: rgba(0,0,0,.06);
    }

    .reply-name {
      display: block;
      margin-bottom: 2px;
      font-weight: 750;
    }

    .reply-text {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 230px;
    }

    .message-reactions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 5px;
    }

    .reaction-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      min-height: 24px;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.09);
      font-size: 13px;
      line-height: 1;
    }

    .message-row.me .reaction-chip {
      background: rgba(0,0,0,.08);
    }

    .reaction-chip.mine {
      outline: 1px solid currentColor;
    }

    .composer-reply {
      display: none;
      align-items: center;
      gap: 9px;
      margin-bottom: 7px;
      padding: 8px 10px;
      border-radius: 13px;
      background: #1b1b1b;
    }

    .composer-reply.visible {
      display: flex;
    }

    .composer-reply-line {
      width: 3px;
      align-self: stretch;
      border-radius: 99px;
      background: #d7d7d7;
    }

    .composer-reply-content {
      min-width: 0;
      flex: 1;
    }

    .composer-reply-name {
      color: #e4e4e4;
      font-size: 12px;
      font-weight: 750;
    }

    .composer-reply-text {
      margin-top: 2px;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .composer-reply-close {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      color: #bdbdbd;
      font-size: 20px;
      line-height: 1;
    }

    .message-menu-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      padding: 16px max(16px, env(safe-area-inset-right))
        calc(16px + env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
      background: rgba(0,0,0,.56);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      transition: opacity .16s ease, visibility .16s ease;
    }

    .message-menu-overlay.visible {
      visibility: visible;
      opacity: 1;
    }

    .message-menu {
      width: 100%;
      max-width: 420px;
      padding: 8px;
      border: 1px solid #303030;
      border-radius: 22px;
      background: #1b1b1b;
      box-shadow: var(--shadow);
      transform: translateY(18px);
      transition: transform .18s ease;
    }

    .message-menu-overlay.visible .message-menu {
      transform: translateY(0);
    }

    .reaction-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      padding: 4px 2px 8px;
    }

    .reaction-button {
      min-height: 42px;
      border-radius: 13px;
      font-size: 22px;
    }

    .reaction-button:active {
      background: #292929;
      transform: scale(.92);
    }

    .message-action {
      width: 100%;
      min-height: 46px;
      padding: 0 14px;
      border-radius: 13px;
      color: var(--text);
      text-align: left;
      font-size: 14px;
      font-weight: 650;
    }

    .message-action:active {
      background: #272727;
    }

    .message-action.danger {
      color: #ff7773;
    }

    .media-viewer {
      position: fixed;
      inset: 0;
      z-index: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      padding: max(18px, env(safe-area-inset-top))

    function avatarColor(username = "") {
      const colors = [
        "#7c3aed", "#2563eb", "#0891b2", "#059669",
        "#65a30d", "#ca8a04", "#ea580c", "#dc2626",
        "#db2777", "#9333ea", "#475569", "#0f766e"
      ];

      let hash = 0;
      const value = String(username || "user");

      for (let i = 0; i < value.length; i++) {
        hash = value.charCodeAt(i) + ((hash << 5) - hash);
      }

      return colors[Math.abs(hash) % colors.length];
    }

    function getAudioContext() {
      if (soundLevel <= 0) return null;

      if (!audioContext) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return null;
        audioContext = new AudioContextClass();
      }

      if (audioContext.state === "suspended") {
        audioContext.resume().catch(() => {});
      }

      return audioContext;
    }

    function playTone({ frequency = 520, endFrequency = null, duration = 0.07, volume = 0.035, delay = 0, type = "sine" } = {}) {
      const context = getAudioContext();
      if (!context) return;

      const start = context.currentTime + delay;
      const end = start + duration;
      const oscillator = context.createOscillator();
      const gain = context.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, start);

      if (endFrequency) {
        oscillator.frequency.exponentialRampToValueAtTime(Math.max(1, endFrequency), end);
      }

      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume * soundLevel, start + Math.min(0.018, duration / 3));
      gain.gain.exponentialRampToValueAtTime(0.0001, end);

      oscillator.connect(gain);
      gain.connect(context.destination);

      oscillator.start(start);
      oscillator.stop(end + 0.02);
    }

    async function reserveUsername(uid, username, oldUsername = "") {
      const lower = username.toLowerCase();

      await runTransaction(db, async (transaction) => {
        const usernameRef = doc(db, "usernames", lower);
        const usernameSnapshot = await transaction.get(usernameRef);

        if (usernameSnapshot.exists() && usernameSnapshot.data().uid !== uid) {
          throw new Error("Этот юзернейм уже занят.");
        }

        transaction.set(usernameRef, {
          uid,
          username,
          updatedAt: serverTimestamp()
        });

        if (oldUsername && oldUsername.toLowerCase() !== lower) {
          const oldRef = doc(db, "usernames", oldUsername.toLowerCase());
          const oldSnapshot = await transaction.get(oldRef);

          if (oldSnapshot.exists() && oldSnapshot.data().uid === uid) {
            transaction.delete(oldRef);
          }
        }
      });
    }

    function fallbackUsername(user) {
      const base =
        user.email
          ?.split("@")[0]
          ?.replace(/[^a-zA-Z1-9_]/g, "")
          ?.replace(/0/g, "")
          ?.slice(0, 9) || "user";

      const tail =
        user.uid
          .replace(/[^a-zA-Z1-9]/g, "")
          .replace(/0/g, "")
          .slice(0, 5) || "12345";

      return cleanUsername(`${base}_${tail}`);
    }

    async function createProfileIfMissing(user, preferredUsername = "") {
      const userRef = doc(db, "users", user.uid);
      const current = await getDoc(userRef);

      if (current.exists()) {
        return current.data();
      }

      let username = cleanUsername(preferredUsername) || fallbackUsername(user);

      for (let attempt = 0; attempt < 15; attempt++) {
        const suffix = attempt === 0 ? "" : "_" + Math.random().toString(36).slice(2, 7).replace(/0/g, "1");
        const candidate = cleanUsername(username.slice(0, 16 - suffix.length) + suffix);

        if (!USERNAME_PATTERN.test(candidate)) continue;

        try {
          await reserveUsername(user.uid, candidate);

          await setDoc(userRef, {
            uid: user.uid,
            username: candidate,
            usernameLower: candidate.toLowerCase(),
            avatar: "",
            lastSeen: serverTimestamp(),
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });

          return (await getDoc(userRef)).data();
        } catch (error) {
          if (String(error.message).includes("занят")) continue;
          throw error;
        }
      }

      throw new Error("Не удалось создать профиль.");
    }

    async function saveProfile(usernameValue, avatarValue) {
      const username = cleanUsername(usernameValue);

      if (!USERNAME_PATTERN.test(username)) {
        throw new Error("Юзернейм: английские буквы, цифры 1–9 и _, максимум 16 символов.");
      }

        uid: currentUser.uid,
        username,
        usernameLower: username.toLowerCase(),
        avatar: avatarValue || "",
        lastSeen: serverTimestamp(),
        updatedAt: serverTimestamp()
      }, { merge: true });

      myProfile = (await getDoc(doc(db, "users", currentUser.uid))).data();
    }

    function formatListTime(dateLike) {
      const date = dateLike?.toDate?.();

      if (!date) return "";

      const now = new Date();
      const sameDay =
        now.getFullYear() === date.getFullYear() &&
        now.getMonth() === date.getMonth() &&
        now.getDate() === date.getDate();

      if (sameDay) {
        return date.toLocaleTimeString("ru-RU", {
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      return date.toLocaleDateString("ru-RU", {
        day: "2-digit",
        month: "2-digit"
      });
    }


    function userChatSummaryRef(ownerUid, chatId) {
      return doc(db, "userChats", ownerUid, "items", chatId);
    }

    function buildUserChatSummary(ownerUid, peer, chatId, payload = {}) {
      return {
        chatId,
        ownerUid,
        peerUid: peer.uid,
        peerUsername: peer.username || "Пользователь",
        peerAvatar: peer.avatar || "",
        lastMessage: payload.lastMessage || "",
        lastSenderId: payload.lastSenderId || "",
        updatedAt: payload.updatedAt || serverTimestamp()
      };
    }

    async function updateUserChatIndexes({
      chatId,
      peer,
      lastMessage = "",
      lastSenderId = "",
      updatedAt = serverTimestamp()
    }) {
      const batch = writeBatch(db);

      batch.set(
        userChatSummaryRef(currentUser.uid, chatId),
        buildUserChatSummary(
          currentUser.uid,
          peer,
          chatId,
          {
            lastMessage,
            lastSenderId,
            updatedAt
          }
        ),
        { merge: true }
      );

      batch.set(
        userChatSummaryRef(peer.uid, chatId),
        buildUserChatSummary(
          peer.uid,
          {
            uid: currentUser.uid,
            username: myProfile.username,
            avatar: myProfile.avatar || ""
          },
          chatId,
          {
            lastMessage,
            lastSenderId,
            updatedAt
          }
        ),
        { merge: true }
      );

      await batch.commit();
    }

    async function backfillUserChatIndexFromChat(chat) {
      const peer = peerFromChat(chat);

      if (!peer) return;

      await setDoc(
        userChatSummaryRef(currentUser.uid, chat.id),
        buildUserChatSummary(
          currentUser.uid,
          peer,
          chat.id,
          {
            lastMessage: chat.lastMessage || "",
            lastSenderId: chat.lastSenderId || "",
            updatedAt: chat.updatedAt || serverTimestamp()
          }
        ),
        { merge: true }
      );
    }

    function peerFromChat(chatData) {
      let peerUid = "";

      if (Array.isArray(chatData.members)) {
        peerUid =
          chatData.members.find((uid) => uid !== currentUser.uid) || "";
      }

      if (!peerUid && chatData.memberMap) {
        peerUid =
          Object.keys(chatData.memberMap).find(
            (uid) => uid !== currentUser.uid && chatData.memberMap[uid] === true
          ) || "";
      }

      if (!peerUid && chatData.usernames) {
        peerUid =
          Object.keys(chatData.usernames).find(
            (uid) => uid !== currentUser.uid
          ) || "";
      }

      if (!peerUid && chatData.avatars) {
        peerUid =
          Object.keys(chatData.avatars).find(
            (uid) => uid !== currentUser.uid
          ) || "";
      }

      if (!peerUid) return null;

      return {
        uid: peerUid,
        username:
          chatData.usernames?.[peerUid] ||
          "Пользователь",
        avatar:
          chatData.avatars?.[peerUid] ||
          ""
      };
    }

    function renderChatList(chats) {
      const list = $("chatList");
      const label = $("chatListLabel");
      const empty = $("emptyState");

      list.innerHTML = "";
      label.classList.add("hidden");

      const visibleChats = chats
        .filter((chat) => chat.peerUid)
        .sort((a, b) => {
          const aTime = a.updatedAt?.toMillis?.() || 0;
          const bTime = b.updatedAt?.toMillis?.() || 0;
          return bTime - aTime;
        });

      if (!$("searchInput").value.trim()) {
        empty.textContent =
          visibleChats.length === 0
            ? "Диалогов пока нет"
            : "";

        empty.classList.toggle(
          "hidden",
          visibleChats.length > 0
        );
      }

      for (const chat of visibleChats) {
        const peer = {
          uid: chat.peerUid,
          username: chat.peerUsername || "Пользователь",
          avatar: chat.peerAvatar || ""
        };

        const item = document.createElement("button");
        item.type = "button";
        item.className = "chat-list-item";

        const isOwnLast =
          chat.lastSenderId === currentUser.uid;

        item.innerHTML = `
          ${avatarHtml(peer, "chat-list-avatar", 30)}
          <div class="chat-list-text">
            <div class="chat-list-name">${escapeHtml(peer.username)}</div>
            <div class="chat-list-preview">${escapeHtml(chat.lastMessage || "Диалог")}</div>
          </div>
          <div class="chat-list-time">
            ${isOwnLast ? '<span class="checks">✓✓</span>' : ''}
            ${formatListTime(chat.updatedAt)}
          </div>
        `;

        item.addEventListener("click", () => {
          playClick();
          openChat(peer, chat.chatId || chat.id);
        });

        list.appendChild(item);
      }
    }

    function listenChatList() {
      if (Array.isArray(chatListUnsubscribe)) {
        chatListUnsubscribe.forEach((unsubscribe) => unsubscribe?.());
      } else {
        chatListUnsubscribe?.();
      }

      const summariesQuery = query(
        collection(db, "userChats", currentUser.uid, "items"),
        orderBy("updatedAt", "desc")
      );

      const summaryUnsubscribe = onSnapshot(
        summariesQuery,
        (snapshot) => {
          renderChatList(
            snapshot.docs.map((itemDoc) => ({
              id: itemDoc.id,
              ...itemDoc.data()
            }))
          );
        },
        (error) => {
          console.warn("Не удалось загрузить список диалогов:", error);
          $("emptyState").textContent = "Не удалось загрузить диалоги";
          $("emptyState").classList.remove("hidden");
        }
      );

      chatListUnsubscribe = [summaryUnsubscribe];

      /*
       * Одноразовое восстановление старых чатов.
       * Это нужно только для переписок, созданных предыдущими версиями.
       */
      (async () => {
        const found = new Map();

        const collect = (snapshot) => {
          for (const chatDoc of snapshot.docs) {
            found.set(chatDoc.id, {
              id: chatDoc.id,
              ...chatDoc.data()
            });
          }
        };

        try {
          const membersQuery = query(
            collection(db, "chats"),
            where("members", "array-contains", currentUser.uid)
          );

          collect(await getDocs(membersQuery));
        } catch (error) {
          console.warn("Не удалось прочитать новые чаты:", error);
        }

        try {
          const legacyQuery = query(
            collection(db, "chats"),
            where(`memberMap.${currentUser.uid}`, "==", true)
          );

          collect(await getDocs(legacyQuery));
        } catch (error) {
          console.warn("Не удалось прочитать старые чаты:", error);
        }

        for (const chat of found.values()) {
          await backfillUserChatIndexFromChat(chat).catch((error) => {
            console.warn("Не удалось восстановить чат:", chat.id, error);
          });
        }
      })();
    }

    function renderFoundUser(profile) {
      const results = $("results");
      const empty = $("emptyState");

      results.innerHTML = "";

      if (!profile) {
        empty.classList.remove("hidden");
        return;

      empty.classList.add("hidden");

      const card = document.createElement("button");
      card.type = "button";
      card.className = "user-card";
      card.innerHTML = `
        ${avatarHtml(profile, "avatar", 30)}
        <div class="user-card-name">${escapeHtml(profile.username)}</div>
      `;

      card.addEventListener("click", () => {
        playClick();
        openChat(profile);
      });

      results.appendChild(card);
    }

    async function searchUser() {
      const username = cleanUsername($("searchInput").value);

      if (!username) {
        foundProfile = null;
        $("results").innerHTML = "";
        $("chatListSection").classList.remove("hidden");

        if (!$("chatList").children.length) {
          $("emptyState").textContent = "Диалогов пока нет";
          $("emptyState").classList.remove("hidden");
        } else {
          $("emptyState").classList.add("hidden");
        }

        return;
      }

      $("chatListSection").classList.add("hidden");

      const usernameSnapshot = await getDoc(doc(db, "usernames", username.toLowerCase()));

      if (!usernameSnapshot.exists()) {
        foundProfile = null;
        $("results").innerHTML = "";
        $("emptyState").textContent = "Пользователь не найден";
        $("emptyState").classList.remove("hidden");
        return;
      }

      const uid = usernameSnapshot.data().uid;

      if (uid === currentUser.uid) {
        foundProfile = null;
        $("results").innerHTML = "";
        $("emptyState").textContent = "Это ваш аккаунт";
        $("emptyState").classList.remove("hidden");
        return;
      }

      const profileSnapshot = await getDoc(doc(db, "users", uid));
      foundProfile = profileSnapshot.exists() ? profileSnapshot.data() : null;

      renderFoundUser(foundProfile);
    }

    async function ensureChat(peer) {
      const chatId = chatIdFor(currentUser.uid, peer.uid);
      const chatRef = doc(db, "chats", chatId);

      const now = serverTimestamp();

      await setDoc(chatRef, {
        id: chatId,
        members: [currentUser.uid, peer.uid],
        memberMap: {
          [currentUser.uid]: true,
          [peer.uid]: true
        },
        usernames: {
          [currentUser.uid]: myProfile.username,
          [peer.uid]: peer.username
        },
        avatars: {
          [currentUser.uid]: myProfile.avatar || "",
          [peer.uid]: peer.avatar || ""
        },
        updatedAt: now
      }, { merge: true });

      await updateUserChatIndexes({
        chatId,
        peer,
        lastMessage: "",
        lastSenderId: "",
        updatedAt: now
      });

      return chatId;
    }

    async function openChat(peer, knownChatId = null) {
      activePeer = peer;
      activeChatId =
        knownChatId ||
        chatIdFor(currentUser.uid, peer.uid);

      $("chatScreen").classList.add("visible");
      document.body.style.overflow = "hidden";

      $("messages").innerHTML = "";
      $("chatUsername").textContent = peer.username;
      renderAvatarSlot(
        $("chatHeaderAvatarSlot"),
        peer,
        30,
        "chat-header-avatar"
      );
      updateChatStatus(peer);

      activeChatUnsubscribe?.();
      activeMessagesUnsubscribe?.();
      activePeerUnsubscribe?.();

      activePeerUnsubscribe = onSnapshot(
        doc(db, "users", peer.uid),
        (snapshot) => {
          if (!snapshot.exists()) return;

          activePeer = snapshot.data();

          renderAvatarSlot(
            $("chatHeaderAvatarSlot"),
            activePeer,
            30,
            "chat-header-avatar"
          );

          $("chatUsername").textContent =
            activePeer.username;

          updateChatStatus(activePeer);
        }
      );

      try {
        await ensureChat(peer);
      } catch (error) {
        console.warn("Не удалось подготовить чат:", error);
      }

      if (!activePeer || activePeer.uid !== peer.uid) {
        return;
      }

      activeChatUnsubscribe = onSnapshot(
        doc(db, "chats", activeChatId),
        (snapshot) => {
          if (!snapshot.exists()) return;
          updateTypingStatus(snapshot.data());
        }
      );

      const messagesQuery = query(
        collection(db, "chats", activeChatId, "messages"),
        orderBy("createdAt", "asc"),
        limit(200)
      );

      activeMessagesUnsubscribe = onSnapshot(
        messagesQuery,
        async (snapshot) => {
          renderMessages(
            snapshot.docs.map((messageDoc) => ({
              id: messageDoc.id,
              ...messageDoc.data()
            }))
          );

          await markMessagesRead(snapshot.docs);
        }
      );
    }

    function closeChat() {
      activeChatUnsubscribe?.();
      activeMessagesUnsubscribe?.();
      activePeerUnsubscribe?.();

      activeChatUnsubscribe = null;
      activeMessagesUnsubscribe = null;
      activePeerUnsubscribe = null;

      activePeer = null;
      activeChatId = null;
      currentMessages.clear();
      clearReply();
      closeMessageMenu();

      $("chatScreen").classList.remove("visible");
      document.body.style.overflow = "";

      if (!$("searchInput").value.trim()) {
        $("chatListSection").classList.remove("hidden");
      }

      playCloseSound();
    }

    function updateChatStatus(peer) {
      if (!activePeer) return;

      $("chatStatus").textContent = isOnline(peer) ? "в сети" : "не в сети";
    }

    function updateTypingStatus(chatData) {
      if (!activePeer) return;

      const typing = chatData?.typing || {};
      const peerTyping = typing[activePeer.uid];
      const typingTime = peerTyping?.toMillis?.() || 0;

      if (Date.now() - typingTime < 4500) {
        $("chatStatus").textContent = "Печатает...";
        return;
      }

      updateChatStatus(activePeer);
    }

    function renderMessages(messages) {
      const container = $("messages");
      const shouldStick =
        container.scrollHeight - container.scrollTop - container.clientHeight < 140;

      currentMessages = new Map(
        messages.map((message) => [message.id, message])
      );

      container.innerHTML = "";

      for (const message of messages) {
        const isMine = message.senderId === currentUser.uid;
        const row = document.createElement("div");

        row.className = `message-row ${isMine ? "me" : "other"}`;
        row.dataset.messageId = message.id;

        const seen =
          Array.isArray(message.seenBy) &&
          activePeer &&
          message.seenBy.includes(activePeer.uid);

        const checks = isMine
          ? `<span class="checks">${seen ? "✓✓" : "✓"}</span>`
          : "";

        const media = message.attachment?.data
          ? renderMessageAttachment(message.attachment, message.id)
          : "";

        const textContent = message.text
          ? `<span class="bubble-text">${escapeHtml(message.text)}</span>`
          : "";

        const reply = message.reply
          ? `
            <div class="reply-quote" data-reply-id="${escapeHtml(message.reply.id || "")}">
              <span class="reply-name">${escapeHtml(
                message.reply.senderId === currentUser.uid
                  ? "Вы"
                  : activePeer?.username || "Пользователь"
              )}</span>
              <span class="reply-text">${escapeHtml(
                message.reply.text ||
                (message.reply.attachmentType?.startsWith("image/")
                  ? "Фотография"
                  : message.reply.attachmentType?.startsWith("video/")
                    ? "Видео"
                    : "Сообщение")
              )}</span>
            </div>
          `
          : "";

        const reactions = renderReactions(message);

        row.innerHTML = `
          <div class="bubble">
            ${reply}
            ${media}
            <div class="bubble-line">${textContent}<span class="meta">
              <span>${formatTime(message.createdAt)}</span>${checks}
            </span></div>
            ${reactions}
          </div>
        `;

        attachMessageInteractions(row, message);
        container.appendChild(row);
      }

      if (shouldStick) {
        requestAnimationFrame(() => {
          container.scrollTop = container.scrollHeight;
        });
      }
    }

    function renderReactions(message) {
      const reactions = message.reactions || {};
      const chips = [];

      for (const [emoji, userIds] of Object.entries(reactions)) {
        if (!Array.isArray(userIds) || userIds.length === 0) continue;

        const mine = userIds.includes(currentUser.uid);

        chips.push(`
          <button
            class="reaction-chip ${mine ? "mine" : ""}"
            type="button"
            data-message-id="${escapeHtml(message.id)}"
            data-reaction="${escapeHtml(emoji)}"
          >
            <span>${escapeHtml(emoji)}</span>
            <span>${userIds.length}</span>
          </button>
        `);
      }

      return chips.length
        ? `<div class="message-reactions">${chips.join("")}</div>`
        : "";
    }

    function attachMessageInteractions(row, message) {
      row.addEventListener("contextmenu", (event) => {
        event.preventDefault();
        openMessageMenu(
          message.id,
          event.clientX,
          event.clientY
        );
      });

      row.addEventListener("pointerdown", (event) => {
        if (event.pointerType === "mouse") return;

        longPressStart = {
          x: event.clientX,
          y: event.clientY
        };

        window.clearTimeout(longPressTimer);
        longPressTimer = window.setTimeout(() => {
          openMessageMenu(
            message.id,
            longPressStart.x,
            longPressStart.y
          );
          if (navigator.vibrate) navigator.vibrate(25);
        }, 520);
      });

      row.addEventListener("pointermove", (event) => {
        if (!longPressStart) return;

        const distance = Math.hypot(
          event.clientX - longPressStart.x,
          event.clientY - longPressStart.y
        );

        if (distance > 10) {
          window.clearTimeout(longPressTimer);
          longPressStart = null;
        }
      });

      const stopLongPress = () => {
        window.clearTimeout(longPressTimer);
        longPressStart = null;
      };

      row.addEventListener("pointerup", stopLongPress);
      row.addEventListener("pointercancel", stopLongPress);
      row.addEventListener("pointerleave", stopLongPress);

      row.querySelectorAll(".reaction-chip").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          toggleReaction(
            button.dataset.messageId,
            button.dataset.reaction
          );
        });
      });

      row.querySelectorAll(".reply-quote").forEach((quote) => {
        quote.addEventListener("click", () => {
          const target = containerMessageElement(quote.dataset.replyId);
          target?.scrollIntoView({
            behavior: "smooth",
            block: "center"
          });
        });
      });
    }

    function containerMessageElement(messageId) {
      if (!messageId) return null;

      return $("messages").querySelector(
        `[data-message-id="${CSS.escape(messageId)}"]`
      );
    }

    function renderMessageAttachment(attachment, messageId) {
      const safeName = escapeHtml(attachment.name || "file");

      if (attachment.type?.startsWith("image/")) {
        return `
          <img
            class="bubble-media image-attachment"
            src="${attachment.data}"
            alt="${safeName}"
            data-image-src="${attachment.data}"
            data-image-name="${safeName}"
            data-message-id="${escapeHtml(messageId)}"
          >
        `;
      }

      if (attachment.type?.startsWith("video/")) {
        return `<video class="bubble-media" src="${attachment.data}" controls playsinline></video>`;
      }

      return `<div class="bubble-text">${safeName}</div>`;
    }

    function openMessageMenu(messageId, clientX = null, clientY = null) {
      const message = currentMessages.get(messageId);

      if (!message) return;

      contextMessageId = messageId;

      $("deleteMessageButton").classList.toggle(
        "hidden",
        message.senderId !== currentUser.uid
      );

      const overlay = $("messageMenuOverlay");
      const menu = overlay.querySelector(".message-menu");

      overlay.classList.add("visible");

      const menuWidth = 214;
      const estimatedHeight =
        message.senderId === currentUser.uid ? 126 : 86;

      const fallbackRow =
        $("messages").querySelector(
          `[data-message-id="${CSS.escape(messageId)}"]`
        );

      const rect = fallbackRow?.getBoundingClientRect();

      let x = clientX ?? rect?.left ?? 18;
      let y = clientY ?? rect?.top ?? 18;

      if (message.senderId === currentUser.uid) {
        x = (clientX ?? rect?.right ?? window.innerWidth - 18) - menuWidth;
      }

      x = Math.max(
        8,
        Math.min(x, window.innerWidth - menuWidth - 8)
      );

      y = Math.max(
        8,
        Math.min(y, window.innerHeight - estimatedHeight - 8)
      );

      overlay.style.setProperty("--menu-x", `${x}px`);
      overlay.style.setProperty("--menu-y", `${y}px`);

      playOpenSound();
    }

    function closeMessageMenu() {
      contextMessageId = null;
      $("messageMenuOverlay").classList.remove("visible");
    }

    function setReplyTarget(message) {
      replyTarget = message;

      $("composerReplyName").textContent =
        message.senderId === currentUser.uid
          ? "Вы"
          : activePeer?.username || "Пользователь";

      $("composerReplyText").textContent =
        message.text ||
        (message.attachment?.type?.startsWith("image/")
          ? "Фотография"
          : message.attachment?.type?.startsWith("video/")
            ? "Видео"
            : "Сообщение");

      $("composerReply").classList.add("visible");
      $("messageInput").focus();
    }

    function clearReply() {
      replyTarget = null;
      $("composerReply").classList.remove("visible");
      $("composerReplyName").textContent = "";
      $("composerReplyText").textContent = "";
    }

    async function toggleReaction(messageId, emoji) {
      if (!activeChatId || !messageId || !emoji) return;

      const message = currentMessages.get(messageId);

      if (!message) return;

      const reactions = structuredClone(message.reactions || {});
      const users = Array.isArray(reactions[emoji])
        ? [...reactions[emoji]]
        : [];

      const index = users.indexOf(currentUser.uid);

      if (index >= 0) {
        users.splice(index, 1);
      } else {
        users.push(currentUser.uid);
      }

      if (users.length) {
        reactions[emoji] = users;
      } else {
        delete reactions[emoji];
      }

      try {
        await updateDoc(
          doc(db, "chats", activeChatId, "messages", messageId),
          {
            reactions,
            reactionsUpdatedAt: serverTimestamp()
          }
        );

        playClick();
      } catch (error) {
        alert(getReadableError(error));
      }
    }

    async function deleteSelectedMessage() {
      if (!contextMessageId || !activeChatId) return;

      const message = currentMessages.get(contextMessageId);

      if (!message || message.senderId !== currentUser.uid) {
        closeMessageMenu();
        return;
      }

      const confirmed = window.confirm(
        "Удалить сообщение у вас и у собеседника?"
      );

      if (!confirmed) return;

      const deletingId = contextMessageId;
      closeMessageMenu();

      try {
        await deleteDoc(
          doc(db, "chats", activeChatId, "messages", deletingId)
        );

        const remaining = [...currentMessages.values()]
          .filter((item) => item.id !== deletingId)
          .sort((a, b) => {
            const aTime = a.createdAt?.toMillis?.() || 0;
            const bTime = b.createdAt?.toMillis?.() || 0;
            return bTime - aTime;
          });

        const latest = remaining[0];

        const latestPreview = latest
          ? latest.text ||
            (latest.attachment?.type?.startsWith("image/")
              ? "Фотография"
              : latest.attachment?.type?.startsWith("video/")
                ? "Видео"
                : "Вложение")
          : "";

        const latestUpdatedAt = serverTimestamp();

        await setDoc(
          doc(db, "chats", activeChatId),
          {
            lastMessage: latestPreview,
            lastSenderId: latest?.senderId || "",
            updatedAt: latestUpdatedAt
          },
          { merge: true }
        );

        await updateUserChatIndexes({
          chatId: activeChatId,
          peer: activePeer,
          lastMessage: latestPreview,
          lastSenderId: latest?.senderId || "",
          updatedAt: latestUpdatedAt
        });

        if (replyTarget?.id === deletingId) {
          clearReply();
        }

        playCloseSound();
      } catch (error) {
        alert(getReadableError(error));
      }
    }

    function openImageViewer(src, name = "image") {
      $("mediaViewerImage").src = src;
      $("saveMediaButton").href = src;
      $("saveMediaButton").download = name || "image";
      $("mediaViewer").classList.add("visible");
      document.body.style.overflow = "hidden";
    }

    function closeImageViewer() {
      $("mediaViewer").classList.remove("visible");
      $("mediaViewerImage").src = "";

      if (!$("chatScreen").classList.contains("visible")) {
        document.body.style.overflow = "";
      }
    }

    async function markMessagesRead(messageDocs) {
      if (!activeChatId || !currentUser) return;

      const updates = [];

      for (const messageDoc of messageDocs) {
        const message = messageDoc.data();

        if (message.senderId === currentUser.uid) continue;
        if (Array.isArray(message.seenBy) && message.seenBy.includes(currentUser.uid)) continue;

        updates.push(updateDoc(
          doc(db, "chats", activeChatId, "messages", messageDoc.id),
          {
            seenBy: arrayUnion(currentUser.uid),
            readAt: serverTimestamp()
          }
        ).catch(() => {}));
      }

      await Promise.all(updates);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function sendMessage() {
      const text = $("messageInput").value.trim();

      if (!activeChatId || (!text && !selectedAttachment)) return;

      $("sendButton").disabled = true;

      try {
        const message = {
          senderId: currentUser.uid,
          text,
          createdAt: serverTimestamp(),
          seenBy: [currentUser.uid]
        };

        if (selectedAttachment) {
          message.attachment = selectedAttachment;
        }

        if (replyTarget) {
          message.reply = {
            id: replyTarget.id,
            senderId: replyTarget.senderId,
            text: replyTarget.text || "",
            attachmentType: replyTarget.attachment?.type || ""
          };
        }

        await addDoc(collection(db, "chats", activeChatId, "messages"), message);

        const listPreview =
          selectedAttachment
            ? (
                text ||
                (selectedAttachment.type?.startsWith("image/")
                  ? "Фотография"
                  : selectedAttachment.type?.startsWith("video/")
                    ? "Видео"
                    : "Вложение")
              )
            : text;

        const listUpdatedAt = serverTimestamp();

        await setDoc(doc(db, "chats", activeChatId), {
          lastMessage: listPreview,
          lastSenderId: currentUser.uid,
          updatedAt: listUpdatedAt,
          members: [currentUser.uid, activePeer.uid],
          memberMap: {
            [currentUser.uid]: true,
            [activePeer.uid]: true
          },
          usernames: {
            [currentUser.uid]: myProfile.username,
            [activePeer.uid]: activePeer.username
          },
          avatars: {
            [currentUser.uid]: myProfile.avatar || "",
            [activePeer.uid]: activePeer.avatar || ""
          }
        }, { merge: true });

        await updateUserChatIndexes({
          chatId: activeChatId,
          peer: activePeer,
          lastMessage: listPreview,
          lastSenderId: currentUser.uid,
          updatedAt: listUpdatedAt
        });

        $("messageInput").value = "";
        resizeMessageInput();
        clearAttachment();
        clearReply();
        playSendSound();

        setTyping(false);
      } catch (error) {
        alert(getReadableError(error));
      } finally {
        updateSendButton();
      }
    }

    function updateSendButton() {
      $("sendButton").disabled = !$("messageInput").value.trim() && !selectedAttachment;
    }

    function resizeMessageInput() {
      const input = $("messageInput");
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 116) + "px";
    }

    async function setTyping(isTyping) {
      if (!activeChatId || !currentUser) return;

      await setDoc(doc(db, "chats", activeChatId), {
        typing: {
          [currentUser.uid]: isTyping ? serverTimestamp() : null
        }
      }, { merge: true }).catch(() => {});
    }

    function clearAttachment() {
      selectedAttachment = null;
      $("fileInput").value = "";
      $("attachmentPreview").classList.remove("visible");
      $("attachmentName").textContent = "";
      updateSendButton();
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function openProfile() {
      pendingAvatar = myProfile?.avatar || "";
      renderAvatarSlot($("profileAvatarSlot"), { avatar: pendingAvatar }, 96, "profile-avatar");
      $("profileUsernameInput").value = myProfile ? "@" + myProfile.username : "";
      showHint($("profileHint"), "");
      openModal($("profileModal"));
    }

    function openSettings() {
      updateSettingsUi();
      openModal($("settingsModal"));
    }

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;

      if (!user) {
        $("authScreen").classList.remove("hidden");
        clearInterval(presenceTimer);
        chatListUnsubscribe?.();
        chatListUnsubscribe = null;
        closeChat();
        return;
      }

      try {
        myProfile = await createProfileIfMissing(user, cleanUsername($("authUsername").value));
        await startSession();
      } catch (error) {
        $("authScreen").classList.remove("hidden");
        showHint($("authHint"), getReadableError(error), true);
      }
    });

    let searchTimer = null;

    $("searchInput").addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(searchUser, 280);
    });

    $("loginButton").addEventListener("click", login);
    $("registerButton").addEventListener("click", register);

    $("profileButton").addEventListener("click", openProfile);
    $("settingsButton").addEventListener("click", openSettings);

    $("closeProfileButton").addEventListener("click", () => closeModal($("profileModal")));
    $("closeSettingsButton").addEventListener("click", () => closeModal($("settingsModal")));

    $("saveProfileButton").addEventListener("click", async () => {
      try {
        await saveProfile($("profileUsernameInput").value, pendingAvatar);
        closeModal($("profileModal"));
      } catch (error) {
        showHint($("profileHint"), getReadableError(error), true);
      }
    });

    $("profileUsernameInput").addEventListener("input", () => {
      const username = cleanUsername($("profileUsernameInput").value);
      $("profileUsernameInput").value = username ? "@" + username : "";
    });

    $("avatarInput").addEventListener("change", async () => {
      const file = $("avatarInput").files[0];
      if (!file) return;

      if (file.size > 700 * 1024) {
        showHint($("profileHint"), "Выбери фото меньше 700 КБ.", true);
        return;
      }

      pendingAvatar = await readFileAsDataUrl(file);
      renderAvatarSlot($("profileAvatarSlot"), { avatar: pendingAvatar }, 96, "profile-avatar");
      playClick();
    });

    $("soundSwitch").addEventListener("click", () => {
      soundsEnabled = !soundsEnabled;
      localStorage.setItem("soundsEnabled", String(soundsEnabled));
      updateSoundUi();
      playClick();
    });

    $("patternsSwitch").addEventListener("click", () => {
      patternsEnabled = !patternsEnabled;
      localStorage.setItem("patternsEnabled", String(patternsEnabled));
      updatePatternsUi();
      playClick();
    });

    $("backButton").addEventListener("click", closeChat);

    $("chatHeaderAvatarButton").addEventListener("click", () => {
      playClick();
    });

    $("messageInput").addEventListener("input", () => {
      resizeMessageInput();
      updateSendButton();

      clearTimeout(typingTimer);
      clearTimeout(typingStopTimer);

      setTyping(true);

      typingStopTimer = setTimeout(() => {
        setTyping(false);
      }, 3500);
    });

    $("messageInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    $("sendButton").addEventListener("click", sendMessage);

    $("clearReplyButton").addEventListener("click", () => {
      clearReply();
      playCloseSound();
    });

    $("replyMessageButton").addEventListener("click", () => {
      const message = currentMessages.get(contextMessageId);

      if (message) {
        setReplyTarget(message);
      }

      closeMessageMenu();
    });

    $("deleteMessageButton").addEventListener(
      "click",
      deleteSelectedMessage
    );

    document.querySelectorAll(".reaction-button").forEach((button) => {
      button.addEventListener("click", async () => {
        const messageId = contextMessageId;
        const emoji = button.dataset.reaction;

        closeMessageMenu();
        await toggleReaction(messageId, emoji);
      });
    });

    $("messageMenuOverlay").addEventListener("click", (event) => {
      if (event.target === $("messageMenuOverlay")) {
        closeMessageMenu();
      }
    });

    $("messages").addEventListener("click", (event) => {
      const image = event.target.closest(".image-attachment");

      if (!image) return;

      openImageViewer(
        image.dataset.imageSrc,
        image.dataset.imageName || "image"
      );
    });

    $("closeMediaViewer").addEventListener(
      "click",
      closeImageViewer
    );

    $("mediaViewer").addEventListener("click", (event) => {
      if (event.target === $("mediaViewer")) {
        closeImageViewer();
      }
    });

    $("fileInput").addEventListener("change", async () => {
      const file = $("fileInput").files[0];
      if (!file) return;

      if (file.size > MAX_ATTACHMENT_SIZE) {
        alert("Файл слишком большой. Максимальный размер фото или видео — 800 КБ.");
        $("fileInput").value = "";
        return;
      }

      if (!file.type.startsWith("image/") && !file.type.startsWith("video/")) {
        alert("Можно прикрепить только фото или видео.");
        $("fileInput").value = "";
        return;
      }

      selectedAttachment = {
        name: file.name,
        type: file.type,
        size: file.size,
        data: await readFileAsDataUrl(file)
      };

      $("attachmentName").textContent = file.type.startsWith("image/")
        ? "Фото готово к отправке"
        : "Видео готово к отправке";

      $("attachmentPreview").classList.add("visible");
      updateSendButton();
      playClick();
    });

    $("clearAttachmentButton").addEventListener("click", clearAttachment);

    document.querySelectorAll(".modal-overlay").forEach((overlay) => {
      overlay.addEventListener("click", (event) => {
        if (event.target === overlay) {
          closeModal(overlay);
        }
      });
    });

    document.addEventListener("pointerdown", (event) => {
      if (event.target.closest("button,label")) {
        getAudioContext();
      }
    }, { passive: true });

    updateSettingsUi();
  </script>
</body>
</html>
