<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#101010">
  <title>UniversalCaller Messenger</title>

  <style>
    :root {
      --bg: #101010;
      --panel: #171717;
      --panel2: #1d1d1d;
      --panel3: #232323;
      --line: #2a2a2a;
      --text: #f2f2f2;
      --muted: #8d8d8d;
      --soft: #6f6f6f;
      --white: #eeeeee;
      --danger: #e53935;
      --ok: #9fd2ad;
      --bubble-me: #eeeeee;
      --bubble-me-text: #111111;
      --bubble-other: #222222;
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      padding: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }

    img,
    video {
      user-select: none;
      -webkit-user-drag: none;
    }

    .hidden {
      display: none !important;
    }

    .app {
      width: 100%;
      max-width: 560px;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      padding:
        max(10px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        calc(20px + env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
      background: var(--bg);
    }

    @media (min-width: 561px) {
      body {
        display: flex;
        justify-content: center;
      }

      .app {
        border-left: 1px solid #202020;
        border-right: 1px solid #202020;
      }
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      background: rgba(16, 16, 16, 0.96);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .search {
      position: relative;
      flex: 1;
      min-width: 0;
    }

    .search svg {
      position: absolute;
      top: 50%;
      left: 14px;
      width: 18px;
      height: 18px;
      color: #8b8b8b;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search svg * {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .search input {
      width: 100%;
      height: 44px;
      padding: 0 14px 0 41px;
      color: var(--text);
      background: var(--panel);
      border: 1px solid transparent;
      border-radius: 14px;
      outline: 0;
      font-size: 14px;
    }

    .search input::placeholder {
      color: #777777;
    }

    .search input:focus {
      background: #1b1b1b;
    }

    .icon-button {
      display: grid;
      place-items: center;
      width: 40px;
      height: 42px;
      border-radius: 50%;
      color: #eeeeee;
      flex: 0 0 auto;
    }

    .icon-button:active {
      transform: scale(0.93);
      background: #1e1e1e;
    }

    .icon-button svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.55;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 2px;
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 58px;
      padding: 8px 8px;
      background: var(--panel);
      border: 0;
      border-radius: 18px;
      box-shadow: none;
      transition: transform .16s ease, background .16s ease;
    }

    .user-card:active {
      transform: scale(0.985);
      background: var(--panel2);
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: #292929;
      flex: 0 0 auto;
    }

    .default-avatar {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: transparent;
      flex: 0 0 auto;
    }

    .default-avatar svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .user-card-name {
      min-width: 0;
      flex: 1;
      color: var(--text);
      font-size: 14px;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      min-height: 340px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--soft);
      text-align: center;
      font-size: 14px;
      padding: 40px 24px;
    }

    .auth-screen {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: radial-gradient(circle at 50% 26%, rgba(255,255,255,.045), transparent 34%), var(--bg);
    }

    .auth-card {
      width: 100%;
      max-width: 390px;
      padding: 22px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid #2b2b2b;
      box-shadow: var(--shadow);
    }

    .field {
      width: 100%;
      height: 48px;
      margin-bottom: 10px;
      padding: 0 14px;
      color: var(--text);
      background: #222222;
      border: 1px solid #333333;
      border-radius: 14px;
      outline: 0;
      font-size: 15px;
    }

    .field:focus {
      border-color: #4a4a4a;
      background: #242424;
    }

    .hint {
      min-height: 18px;
      margin: 4px 0 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .hint.error {
      color: #e1a0a0;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      min-height: 50px;
      padding: 0 16px;
      border-radius: 14px;
      background: #252525;
      color: var(--text);
      font-weight: 650;
      font-size: 14px;
    }

    .btn.primary {
      background: var(--white);
      color: #151515;
    }

    .btn:active {
      transform: scale(.97);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding:
        16px
        max(16px, env(safe-area-inset-right))
        calc(16px + env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
      visibility: hidden;
      opacity: 0;
      background: rgba(0,0,0,.66);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: opacity .2s ease, visibility .2s ease;
    }

    .modal-overlay.visible {
      visibility: visible;
      opacity: 1;
    }

    .modal {
      width: 100%;
      max-width: 508px;
      max-height: calc(100dvh - 32px);
      overflow-y: auto;
      padding: 10px 18px 22px;
      background: #1a1a1a;
      border: 1px solid #303030;
      border-radius: 24px;
      transform: translateY(24px);
      transition: transform .22s ease;
    }

    .modal-overlay.visible .modal {
      transform: translateY(0);
    }

    .handle {
      width: 38px;
      height: 4px;
      margin: 0 auto 22px;
      border-radius: 999px;
      background: #555555;
    }

    .profile-editor {
      display: flex;
      align-items: center;
      flex-direction: column;
    }

    .profile-avatar-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      margin-bottom: 20px;
    }

    .profile-avatar-wrap img,
    .profile-avatar-wrap .default-avatar {
      width: 96px;
      height: 96px;
    }

    .pick-avatar {
      position: absolute;
      right: -2px;
      bottom: -2px;
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      background: var(--white);
      color: #111111;
      border: 3px solid #1a1a1a;
      border-radius: 50%;
      cursor: pointer;
    }

    .pick-avatar svg {
      width: 17px;
      height: 17px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .settings-title {
      margin: 0 0 18px;
      font-size: 20px;
      font-weight: 700;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 58px;
    }

    .switch {
      position: relative;
      width: 44px;
      height: 26px;
      border-radius: 999px;
      background: #363636;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #bfbfbf;
      transition: left .2s ease, background .2s ease;
    }

    .switch.active {
      background: var(--white);
    }

    .switch.active::after {
      left: 21px;
      background: #181818;
    }

    .chat-screen {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: flex;
      flex-direction: column;
      visibility: hidden;
      opacity: 0;
      background: var(--bg);
      transition: opacity .18s ease, visibility .18s ease;
    }

    .chat-screen.visible {
      visibility: visible;
      opacity: 1;
    }

    .chat-shell {
      width: 100%;
      max-width: 560px;
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    @media (min-width: 561px) {
      .chat-shell {
        border-left: 1px solid #202020;
        border-right: 1px solid #202020;
      }
    }

    .chat-header {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 6px;
      min-height: calc(62px + env(safe-area-inset-top));
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        10px
        max(8px, env(safe-area-inset-left));
      background: rgba(16,16,16,.96);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .back-button,
    .chat-header-avatar-button {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      color: var(--white);
    }

    .chat-header-avatar-button {
      overflow: hidden;
    }

    .chat-header-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      background: #292929;
    }

    .chat-header-avatar-button .default-avatar {
      width: 34px;
      height: 34px;
    }

    .back-button:active,
    .chat-header-avatar-button:active {
      background: #1e1e1e;
      transform: scale(.94);
    }

    .back-button svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chat-user {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-user-text {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .chat-username {
      max-width: 190px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.15;
    }

    .chat-status {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.1;
      min-height: 13px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 12px max(12px, env(safe-area-inset-right)) 10px max(12px, env(safe-area-inset-left));
      display: flex;
      flex-direction: column;
      gap: 8px;
      overscroll-behavior: contain;
    }

    .messages::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .message-row {
      display: flex;
      width: 100%;
    }

    .message-row.me {
      justify-content: flex-end;
    }

    .message-row.other {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(78%, 390px);
      padding: 9px 10px 7px;
      border-radius: 18px;
      background: var(--bubble-other);
      color: var(--text);
      overflow: hidden;
    }

    .message-row.me .bubble {
      background: var(--bubble-me);
      color: var(--bubble-me-text);
      border-bottom-right-radius: 6px;
    }

    .message-row.other .bubble {
      border-bottom-left-radius: 6px;
    }

    .bubble-text {
      display: inline;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 15px;
      line-height: 1.38;
    }

    .bubble-media {
      display: block;
      width: 100%;
      max-width: 250px;
      max-height: 310px;
      border-radius: 14px;
      object-fit: cover;
      margin-bottom: 6px;
      background: #111111;
    }

    .bubble video.bubble-media {
      object-fit: contain;
    }

    .meta {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      margin-left: 7px;
      transform: translateY(2px);
      color: rgba(255,255,255,.48);
      font-size: 11px;
      line-height: 1;
      user-select: none;
    }

    .message-row.me .meta {
      color: rgba(0,0,0,.48);
    }

    .checks {
      min-width: 22px;
      display: inline-flex;
      justify-content: flex-end;
      font-weight: 800;
      letter-spacing: -4px;
      transform: translateX(-2px);
    }

    .composer-wrap {
      padding:
        8px
        max(10px, env(safe-area-inset-right))
        calc(10px + env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
      background: rgba(16,16,16,.96);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .composer {
      min-height: 48px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 6px;
      border-radius: 18px;
      background: var(--panel);
    }

    .plus-button,
    .send-button {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .plus-button {
      color: #a6a6a6;
    }

    .plus-button:active {
      background: #242424;
    }

    .plus-button svg {
      width: 23px;
      height: 23px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
    }

    .send-button {
      background: var(--white);
      color: #111111;
      margin-left: 2px;
    }

    .send-button:disabled {
      opacity: .38;
    }

    .send-button svg {
      width: 21px;
      height: 21px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .message-input {
      flex: 1;
      min-height: 36px;
      max-height: 116px;
      padding: 8px 2px;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      line-height: 1.3;
    }

    .message-input::placeholder {
      color: #777777;
    }

    .attachment-preview {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      padding: 8px 10px;
      border-radius: 14px;
      background: #1b1b1b;
      color: var(--muted);
      font-size: 12px;
    }

    .attachment-preview.visible {
      display: flex;
    }

    .attachment-preview button {
      margin-left: auto;
      color: var(--white);
      font-size: 18px;
      line-height: 1;
    }

    @media (max-width: 370px) {
      .app {
        padding-left: 8px;
        padding-right: 8px;
      }

      .icon-button {
        width: 36px;
      }

      .chat-username {
        max-width: 150px;
      }
    }
  </style>
</head>

<body>
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <input id="authEmail" class="field" type="email" placeholder="Email" autocomplete="email">
      <input id="authPassword" class="field" type="password" placeholder="Пароль — минимум 6 символов" autocomplete="current-password">
      <input id="authUsername" class="field" type="text" placeholder="@username при регистрации" maxlength="16" autocomplete="off" autocapitalize="none" spellcheck="false">
      <div id="authHint" class="hint"></div>
      <div class="row">
        <button id="loginButton" class="btn" type="button">Войти</button>
        <button id="registerButton" class="btn primary" type="button">Регистрация</button>
      </div>
    </div>
  </div>

  <main class="app">
    <header class="topbar">
      <div class="search">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="10.5" cy="10.5" r="5.8"></circle>
          <path d="M15 15 20 20"></path>
        </svg>
        <input id="searchInput" type="search" placeholder="Поиск по @username" autocomplete="off">
      </div>

      <button id="settingsButton" class="icon-button" type="button" aria-label="Настройки">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9.55 2.7h4.9L15 4.85c.48.17.94.42 1.35.7l2.15-.6 2.45 4.1-1.6 1.55c.05.46.05.94 0 1.4.05.46.05.94 0 1.4l1.6 1.55-2.45 4.1-2.15-.6c-.41.28-.87.53-1.35.7l-.55 2.15h-4.9L9 19.15c-.48-.17-.94-.42-1.35-.7l-2.15.6-2.45-4.1 1.6-1.55c-.05-.46-.05-.94 0-1.4-.05-.46-.05-.94 0-1.4L3.05 9.05l2.45-4.1 2.15.6c.41-.28.87-.53 1.35-.7z"></path>
          <circle cx="12" cy="12" r="3.1"></circle>
        </svg>
      </button>

      <button id="profileButton" class="icon-button" type="button" aria-label="Профиль">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="7.5" r="3.4"></circle>
          <path d="M5.5 20c.55-4.1 3-6.2 6.5-6.2s5.95 2.1 6.5 6.2"></path>
        </svg>
      </button>
    </header>

    <section id="results" class="results"></section>

    <section id="chatListSection">
      <div id="chatListLabel" class="section-label hidden">Диалоги</div>
      <div id="chatList" class="chat-list"></div>
    </section>

    <div id="emptyState" class="empty">Диалогов пока нет</div>
  </main>

  <section id="chatScreen" class="chat-screen">
    <div class="chat-shell">
      <header class="chat-header">
        <button id="backButton" class="back-button" type="button" aria-label="Назад">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 5 8 12l7 7"></path>
          </svg>
        </button>

        <div class="chat-user">
          <div class="chat-user-text">
            <div id="chatUsername" class="chat-username"></div>
            <div id="chatStatus" class="chat-status"></div>
          </div>
        </div>

        <button id="chatHeaderAvatarButton" class="chat-header-avatar-button" type="button" aria-label="Профиль пользователя">
          <div id="chatHeaderAvatarSlot"></div>
        </button>
      </header>

      <div id="messages" class="messages"></div>

      <footer class="composer-wrap">
        <div id="attachmentPreview" class="attachment-preview">
          <span id="attachmentName"></span>
          <button id="clearAttachmentButton" type="button">×</button>
        </div>

        <div class="composer">
          <label class="plus-button" for="fileInput" aria-label="Прикрепить фото или видео">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14"></path>
              <path d="M5 12h14"></path>
            </svg>
          </label>

          <input id="fileInput" class="hidden" type="file" accept="image/*,video/*">

          <textarea id="messageInput" class="message-input" rows="1" placeholder="Сообщение"></textarea>

          <button id="sendButton" class="send-button" type="button" disabled aria-label="Отправить">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 19V5"></path>
              <path d="M6.5 10.5 12 5l5.5 5.5"></path>
            </svg>
          </button>
        </div>
      </footer>
    </div>
  </section>

  <div id="profileModal" class="modal-overlay">
    <div class="modal">
      <div class="handle"></div>
      <div class="profile-editor">
        <div class="profile-avatar-wrap">
          <div id="profileAvatarSlot"></div>
          <label class="pick-avatar" for="avatarInput" aria-label="Изменить аватар">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7.5h3l1.4-2h7.2l1.4 2h3v11H4Z"></path>
              <circle cx="12" cy="13" r="3.2"></circle>
            </svg>
          </label>
          <input id="avatarInput" class="hidden" type="file" accept="image/png,image/jpeg,image/webp">
        </div>

  <script type="module">
    const firebaseConfig = {

    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";

    import {
      getAuth,
      onAuthStateChanged,

    } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js";

    import {
      getFirestore,

      query,

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);

    const $ = (id) => document.getElementById(id);

    const USERNAME_PATTERN = /^[a-zA-Z1-9_]{1,16}$/;
    const MAX_ATTACHMENT_SIZE = 800 * 1024;

    let currentUser = null;
    let myProfile = null;
    let pendingAvatar = "";
    let foundProfile = null;
    let activePeer = null;
    let activeChatId = null;
    let activeChatUnsubscribe = null;
    let activeMessagesUnsubscribe = null;
    let activePeerUnsubscribe = null;
    let chatListUnsubscribe = null;
    let presenceTimer = null;
    let typingTimer = null;
    let typingStopTimer = null;
    let selectedAttachment = null;
    let audioContext = null;

    function defaultAvatarSvg(size = 50) {
      return `
        <div class="default-avatar" style="width:${size}px;height:${size}px">
          <svg viewBox="0 0 512 512" aria-hidden="true">
            <path
              d="M344 144c-3.92 52.87-43.87 96-88 96s-84.08-43.13-88-96c-4-55.43 35.54-96 88-96s92 40.57 88 96Z"
              fill="none"
              stroke="#ffffff"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="32"
            />
            <path
              d="M256 304c-87 0-160 44.79-160 100v24a36 36 0 0 0 36 36h248a36 36 0 0 0 36-36v-24c0-55.21-73-100-160-100Z"
              fill="none"
              stroke="#ffffff"
              stroke-miterlimit="10"
              stroke-width="32"
            />
          </svg>
        </div>
      `;
    }

    function avatarHtml(profile, className = "avatar", size = 50) {
      if (profile?.avatar) {
        return `<img class="${className}" src="${profile.avatar}" alt="">`;
      }

      return defaultAvatarSvg(size);
    }

    function renderAvatarSlot(slot, profile, size = 50, className = "avatar") {
      slot.innerHTML = avatarHtml(profile, className, size);
    }

    function cleanUsername(value) {
      return value
        .replace(/^@+/, "")
        .replace(/[^a-zA-Z1-9_]/g, "")
        .slice(0, 16);
    }

    function chatIdFor(uidA, uidB) {
      return [uidA, uidB].sort().join("_");
    }

    function isOnline(profile) {
      const lastSeen = profile?.lastSeen?.toMillis?.() || 0;
      return Date.now() - lastSeen < 90000;
    }

    function formatTime(dateLike) {
      const date = dateLike?.toDate?.() || new Date();
      return date.toLocaleTimeString("ru-RU", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function showHint(element, text, isError = false) {
      element.textContent = text;
      element.classList.toggle("error", isError);
    }

    function getReadableError(error) {
      const messages = {
        "auth/invalid-email": "Неверный формат email.",
        "auth/weak-password": "Пароль должен содержать минимум 6 символов.",
        "auth/email-already-in-use": "Аккаунт уже зарегистрирован. Нажмите «Войти».",
        "auth/invalid-credential": "Неверный email или пароль.",
        "auth/network-request-failed": "Ошибка сети.",
        "permission-denied": "Firestore запретил доступ. Проверьте Rules.",
        "firestore/permission-denied": "Firestore запретил доступ. Проверьте Rules."
      };

      return messages[error?.code] || error?.message || "Неизвестная ошибка.";
    }

    function openModal(modal) {
      modal.classList.add("visible");
      document.body.style.overflow = "hidden";
      playOpenSound();
    }

    function closeModal(modal) {
      modal.classList.remove("visible");
      if (!document.querySelector(".modal-overlay.visible") && !$("chatScreen").classList.contains("visible")) {
        document.body.style.overflow = "";
      }
      playCloseSound();
    }

    function getAudioContext() {
      if (!soundEnabled) return null;

      if (!audioContext) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return null;
        audioContext = new AudioContextClass();
      }

      if (audioContext.state === "suspended") {
        audioContext.resume().catch(() => {});
      }

      return audioContext;
    }

    function playTone({ frequency = 520, endFrequency = null, duration = 0.07, volume = 0.035, delay = 0, type = "sine" } = {}) {
      const context = getAudioContext();
      if (!context) return;

      const start = context.currentTime + delay;
      const end = start + duration;
      const oscillator = context.createOscillator();
      const gain = context.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, start);

      if (endFrequency) {
        oscillator.frequency.exponentialRampToValueAtTime(Math.max(1, endFrequency), end);
      }

      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + Math.min(0.018, duration / 3));
      gain.gain.exponentialRampToValueAtTime(0.0001, end);

      oscillator.connect(gain);
      gain.connect(context.destination);

      oscillator.start(start);
      oscillator.stop(end + 0.02);
    }

    function playClick() {
      playTone({ frequency: 560, endFrequency: 450, duration: 0.055, volume: 0.032 });
    }

    function playOpenSound() {
      playTone({ frequency: 430, endFrequency: 570, duration: 0.08, volume: 0.03 });
      playTone({ frequency: 650, endFrequency: 760, duration: 0.08, volume: 0.022, delay: 0.04 });
    }

    function playCloseSound() {
      playTone({ frequency: 560, endFrequency: 390, duration: 0.09, volume: 0.028 });
    }

    function playSendSound() {
      playTone({ frequency: 520, endFrequency: 690, duration: 0.07, volume: 0.034 });
      playTone({ frequency: 760, endFrequency: 930, duration: 0.08, volume: 0.022, delay: 0.045 });
    }

    function updateSoundUi() {
      $("soundSwitch").classList.toggle("active", soundEnabled);
      $("soundSwitch").setAttribute("aria-checked", String(soundEnabled));
    }

    async function reserveUsername(uid, username, oldUsername = "") {
      const lower = username.toLowerCase();

      await runTransaction(db, async (transaction) => {
        const usernameRef = doc(db, "usernames", lower);
        const usernameSnapshot = await transaction.get(usernameRef);

        if (usernameSnapshot.exists() && usernameSnapshot.data().uid !== uid) {
          throw new Error("Этот юзернейм уже занят.");
        }

        transaction.set(usernameRef, {
          uid,
          username,
          updatedAt: serverTimestamp()
        });

        if (oldUsername && oldUsername.toLowerCase() !== lower) {
          const oldRef = doc(db, "usernames", oldUsername.toLowerCase());
          const oldSnapshot = await transaction.get(oldRef);

          if (oldSnapshot.exists() && oldSnapshot.data().uid === uid) {
            transaction.delete(oldRef);
          }
        }
      });
    }

    function fallbackUsername(user) {
      const base =
        user.email
          ?.split("@")[0]
          ?.replace(/[^a-zA-Z1-9_]/g, "")
          ?.replace(/0/g, "")
          ?.slice(0, 9) || "user";

      const tail =
        user.uid
          .replace(/[^a-zA-Z1-9]/g, "")
          .replace(/0/g, "")
          .slice(0, 5) || "12345";

      return cleanUsername(`${base}_${tail}`);
    }

    async function createProfileIfMissing(user, preferredUsername = "") {
      const userRef = doc(db, "users", user.uid);
      const current = await getDoc(userRef);

      if (current.exists()) {
        return current.data();
      }

      let username = cleanUsername(preferredUsername) || fallbackUsername(user);

      for (let attempt = 0; attempt < 15; attempt++) {
        const suffix = attempt === 0 ? "" : "_" + Math.random().toString(36).slice(2, 7).replace(/0/g, "1");
        const candidate = cleanUsername(username.slice(0, 16 - suffix.length) + suffix);

        if (!USERNAME_PATTERN.test(candidate)) continue;

        try {
          await reserveUsername(user.uid, candidate);

          await setDoc(userRef, {
            uid: user.uid,
            username: candidate,
            usernameLower: candidate.toLowerCase(),
            avatar: "",
            lastSeen: serverTimestamp(),
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });

          return (await getDoc(userRef)).data();
        } catch (error) {
          if (String(error.message).includes("занят")) continue;
          throw error;
        }
      }

      throw new Error("Не удалось создать профиль.");
    }

    async function saveProfile(usernameValue, avatarValue) {
      const username = cleanUsername(usernameValue);

      if (!USERNAME_PATTERN.test(username)) {
        throw new Error("Юзернейм: английские буквы, цифры 1–9 и _, максимум 16 символов.");
      }

      await reserveUsername(currentUser.uid, username, myProfile?.username || "");

      await setDoc(doc(db, "users", currentUser.uid), {
        uid: currentUser.uid,
        username,
        usernameLower: username.toLowerCase(),
        avatar: avatarValue || "",
        lastSeen: serverTimestamp(),
        updatedAt: serverTimestamp()
      }, { merge: true });

      myProfile = (await getDoc(doc(db, "users", currentUser.uid))).data();
    }

    async function heartbeat() {
      if (!currentUser) return;

      await setDoc(doc(db, "users", currentUser.uid), {
        lastSeen: serverTimestamp()
      }, { merge: true }).catch(() => {});
    }

    async function register() {
      $("registerButton").disabled = true;

      try {
        showHint($("authHint"), "");

        const email = $("authEmail").value.trim();
        const password = $("authPassword").value;
        const username = cleanUsername($("authUsername").value);

        if (!email) throw new Error("Введите email.");
        if (password.length < 6) throw new Error("Пароль должен содержать минимум 6 символов.");
        if (!USERNAME_PATTERN.test(username)) throw new Error("Укажите корректный юзернейм.");

        const credential = await createUserWithEmailAndPassword(auth, email, password);
        currentUser = credential.user;
        myProfile = await createProfileIfMissing(currentUser, username);

        await startSession();
      } catch (error) {
        showHint($("authHint"), getReadableError(error), true);
      } finally {
        $("registerButton").disabled = false;
      }
    }

    async function login() {
      $("loginButton").disabled = true;

      try {
        showHint($("authHint"), "");

        const email = $("authEmail").value.trim();
        const password = $("authPassword").value;
        const preferred = cleanUsername($("authUsername").value);

        if (!email) throw new Error("Введите email.");
        if (!password) throw new Error("Введите пароль.");

        const credential = await signInWithEmailAndPassword(auth, email, password);
        currentUser = credential.user;
        myProfile = await createProfileIfMissing(currentUser, preferred);

        await startSession();
      } catch (error) {
        showHint($("authHint"), getReadableError(error), true);
      } finally {
        $("loginButton").disabled = false;
      }
    }

    async function startSession() {
      $("authScreen").classList.add("hidden");
      await heartbeat();

      clearInterval(presenceTimer);
      presenceTimer = setInterval(heartbeat, 30000);

      listenChatList();
    }

    function formatListTime(dateLike) {
      const date = dateLike?.toDate?.();

      if (!date) return "";

      const now = new Date();
      const sameDay =
        now.getFullYear() === date.getFullYear() &&
        now.getMonth() === date.getMonth() &&
        now.getDate() === date.getDate();

      if (sameDay) {
        return date.toLocaleTimeString("ru-RU", {
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      return date.toLocaleDateString("ru-RU", {
        day: "2-digit",
        month: "2-digit"
      });
    }

    function peerFromChat(chatData) {
      const peerUid = (chatData.members || []).find(
        (uid) => uid !== currentUser.uid
      );

      if (!peerUid) return null;

      return {
        uid: peerUid,
        username:
          chatData.usernames?.[peerUid] ||
          "Пользователь",
        avatar:
          chatData.avatars?.[peerUid] ||
          ""
      };
    }

    function renderChatList(chats) {
      const list = $("chatList");
      const label = $("chatListLabel");
      const empty = $("emptyState");

      list.innerHTML = "";

      const visibleChats = chats
        .filter((chat) => chat.lastMessage)
        .sort((a, b) => {
          const aTime = a.updatedAt?.toMillis?.() || 0;
          const bTime = b.updatedAt?.toMillis?.() || 0;
          return bTime - aTime;
        });

      label.classList.toggle(
        "hidden",
        visibleChats.length === 0
      );

      if (
        !$("searchInput").value.trim()
      ) {
        empty.textContent =
          visibleChats.length === 0
            ? "Диалогов пока нет"
            : "";

        empty.classList.toggle(
          "hidden",
          visibleChats.length > 0
        );
      }

      for (const chat of visibleChats) {
        const peer = peerFromChat(chat);

        if (!peer) continue;

        const item = document.createElement("button");
        item.type = "button";
        item.className = "chat-list-item";

        item.innerHTML = `
          ${avatarHtml(peer, "chat-list-avatar", 40)}
          <div class="chat-list-text">
            <div class="chat-list-name">${escapeHtml(peer.username)}</div>
            <div class="chat-list-preview">${escapeHtml(chat.lastMessage || "")}</div>
          </div>
          <div class="chat-list-time">${formatListTime(chat.updatedAt)}</div>
        `;

        item.addEventListener("click", () => {
          playClick();
          openChat(peer, chat.id);
        });

        list.appendChild(item);
      }
    }

    function listenChatList() {
      chatListUnsubscribe?.();

      const chatsQuery = query(
        collection(db, "chats"),
        where(`memberMap.${currentUser.uid}`, "==", true)
      );

      chatListUnsubscribe = onSnapshot(
        chatsQuery,
        (snapshot) => {
          renderChatList(
            snapshot.docs.map((chatDoc) => ({
              id: chatDoc.id,
              ...chatDoc.data()
            }))
          );
        },
        (error) => {
          console.warn("Не удалось загрузить список чатов:", error);
        }
      );
    }

    function renderFoundUser(profile) {
      const results = $("results");
      const empty = $("emptyState");

      results.innerHTML = "";

      if (!profile) {
        empty.classList.remove("hidden");
        return;
      }

      empty.classList.add("hidden");

      const card = document.createElement("button");
      card.type = "button";
      card.className = "user-card";
      card.innerHTML = `
        ${avatarHtml(profile, "avatar", 40)}
        <div class="user-card-name">${escapeHtml(profile.username)}</div>
      `;

      card.addEventListener("click", () => {
        playClick();
        openChat(profile);
      });

      results.appendChild(card);
    }

    async function searchUser() {
      const username = cleanUsername($("searchInput").value);

      if (!username) {
        foundProfile = null;
        $("results").innerHTML = "";
        $("chatListSection").classList.remove("hidden");

        if (!$("chatList").children.length) {
          $("emptyState").textContent = "Диалогов пока нет";
          $("emptyState").classList.remove("hidden");
        } else {
          $("emptyState").classList.add("hidden");
        }

        return;
      }

      $("chatListSection").classList.add("hidden");

      const usernameSnapshot = await getDoc(doc(db, "usernames", username.toLowerCase()));

      if (!usernameSnapshot.exists()) {
        foundProfile = null;
        $("results").innerHTML = "";
        $("emptyState").textContent = "Пользователь не найден";
        $("emptyState").classList.remove("hidden");
        return;
      }

      const uid = usernameSnapshot.data().uid;

      if (uid === currentUser.uid) {
        foundProfile = null;
        $("results").innerHTML = "";
        $("emptyState").textContent = "Это ваш аккаунт";
        $("emptyState").classList.remove("hidden");
        return;
      }

      const profileSnapshot = await getDoc(doc(db, "users", uid));
      foundProfile = profileSnapshot.exists() ? profileSnapshot.data() : null;

      renderFoundUser(foundProfile);
    }

    async function ensureChat(peer) {
      const chatId = chatIdFor(currentUser.uid, peer.uid);
      const chatRef = doc(db, "chats", chatId);

      await setDoc(chatRef, {
        id: chatId,
        members: [currentUser.uid, peer.uid],
        memberMap: {
          [currentUser.uid]: true,
          [peer.uid]: true
        },
        usernames: {
          [currentUser.uid]: myProfile.username,
          [peer.uid]: peer.username
        },
        avatars: {
          [currentUser.uid]: myProfile.avatar || "",
          [peer.uid]: peer.avatar || ""
        },
        updatedAt: serverTimestamp()
      }, { merge: true });

      return chatId;
    }

    async function openChat(peer, knownChatId = null) {
      activePeer = peer;
      activeChatId =
        knownChatId ||
        chatIdFor(currentUser.uid, peer.uid);

      $("chatScreen").classList.add("visible");
      document.body.style.overflow = "hidden";

      $("messages").innerHTML = "";
      $("chatUsername").textContent = peer.username;
      renderAvatarSlot(
        $("chatHeaderAvatarSlot"),
        peer,
        34,
        "chat-header-avatar"
      );
      updateChatStatus(peer);

      activeChatUnsubscribe?.();
      activeMessagesUnsubscribe?.();
      activePeerUnsubscribe?.();

      activePeerUnsubscribe = onSnapshot(
        doc(db, "users", peer.uid),
        (snapshot) => {
          if (!snapshot.exists()) return;

          activePeer = snapshot.data();

          renderAvatarSlot(
            $("chatHeaderAvatarSlot"),
            activePeer,
            34,
            "chat-header-avatar"
          );

          $("chatUsername").textContent =
            activePeer.username;

          updateChatStatus(activePeer);
        }
      );

      try {
        await ensureChat(peer);
      } catch (error) {
        console.warn("Не удалось подготовить чат:", error);
      }

      if (!activePeer || activePeer.uid !== peer.uid) {
        return;
      }

      activeChatUnsubscribe = onSnapshot(
        doc(db, "chats", activeChatId),
        (snapshot) => {
          if (!snapshot.exists()) return;
          updateTypingStatus(snapshot.data());
        }
      );

      const messagesQuery = query(
        collection(db, "chats", activeChatId, "messages"),
        orderBy("createdAt", "asc"),
        limit(200)
      );

      activeMessagesUnsubscribe = onSnapshot(
        messagesQuery,
        async (snapshot) => {
          renderMessages(
            snapshot.docs.map((messageDoc) => ({
              id: messageDoc.id,
              ...messageDoc.data()
            }))
          );

          await markMessagesRead(snapshot.docs);
        }
      );
    }

    function closeChat() {
      activeChatUnsubscribe?.();
      activeMessagesUnsubscribe?.();
      activePeerUnsubscribe?.();

      activeChatUnsubscribe = null;
      activeMessagesUnsubscribe = null;
      activePeerUnsubscribe = null;

      activePeer = null;
      activeChatId = null;

      $("chatScreen").classList.remove("visible");
      document.body.style.overflow = "";

      if (!$("searchInput").value.trim()) {
        $("chatListSection").classList.remove("hidden");
      }

      playCloseSound();
    }

    function updateChatStatus(peer) {
      if (!activePeer) return;

      $("chatStatus").textContent = isOnline(peer) ? "в сети" : "не в сети";
    }

    function updateTypingStatus(chatData) {
      if (!activePeer) return;

      const typing = chatData?.typing || {};
      const peerTyping = typing[activePeer.uid];
      const typingTime = peerTyping?.toMillis?.() || 0;

      if (Date.now() - typingTime < 4500) {
        $("chatStatus").textContent = "Печатает...";
        return;
      }

      updateChatStatus(activePeer);
    }

    function renderMessages(messages) {
      const container = $("messages");
      const shouldStick = container.scrollHeight - container.scrollTop - container.clientHeight < 120;

      container.innerHTML = "";

      for (const message of messages) {
        const isMine = message.senderId === currentUser.uid;
        const row = document.createElement("div");

        row.className = `message-row ${isMine ? "me" : "other"}`;

        const seen = Array.isArray(message.seenBy) && activePeer
          ? message.seenBy.includes(activePeer.uid)
          : false;

        const checks = isMine
          ? `<span class="checks">${seen ? "✓✓" : "✓"}</span>`
          : "";

        const media = message.attachment?.data
          ? renderMessageAttachment(message.attachment)
          : "";

        const text = message.text
          ? `<div class="bubble-text">${escapeHtml(message.text)}</div>`
          : "";

        row.innerHTML = `
          <div class="bubble">
            ${media}
            ${text}<div class="meta">
              <span>${formatTime(message.createdAt)}</span>
              ${checks}
            </div>
          </div>
        `;

        container.appendChild(row);
      }

      if (shouldStick) {
        requestAnimationFrame(() => {
          container.scrollTop = container.scrollHeight;
        });
      }
    }

    function renderMessageAttachment(attachment) {
      const safeName = escapeHtml(attachment.name || "file");

      if (attachment.type?.startsWith("image/")) {
        return `<img class="bubble-media" src="${attachment.data}" alt="${safeName}">`;
      }

      if (attachment.type?.startsWith("video/")) {
        return `<video class="bubble-media" src="${attachment.data}" controls playsinline></video>`;
      }

      return `<div class="bubble-text">${safeName}</div>`;
    }

    async function markMessagesRead(messageDocs) {
      if (!activeChatId || !currentUser) return;

      const updates = [];

      for (const messageDoc of messageDocs) {
        const message = messageDoc.data();

        if (message.senderId === currentUser.uid) continue;
        if (Array.isArray(message.seenBy) && message.seenBy.includes(currentUser.uid)) continue;

        updates.push(updateDoc(
          doc(db, "chats", activeChatId, "messages", messageDoc.id),
          {
            seenBy: arrayUnion(currentUser.uid),
            readAt: serverTimestamp()
          }
        ).catch(() => {}));
      }

      await Promise.all(updates);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function sendMessage() {
      const text = $("messageInput").value.trim();

      if (!activeChatId || (!text && !selectedAttachment)) return;

      $("sendButton").disabled = true;

      try {
        const message = {
          senderId: currentUser.uid,
          text,
          createdAt: serverTimestamp(),
          seenBy: [currentUser.uid]
        };

        if (selectedAttachment) {
          message.attachment = selectedAttachment;
        }

        await addDoc(collection(db, "chats", activeChatId, "messages"), message);

        await setDoc(doc(db, "chats", activeChatId), {
          lastMessage: selectedAttachment ? (text || "Вложение") : text,
          lastSenderId: currentUser.uid,
          updatedAt: serverTimestamp(),
          members: [currentUser.uid, activePeer.uid],
          memberMap: {
            [currentUser.uid]: true,
            [activePeer.uid]: true
          }
        }, { merge: true });

        $("messageInput").value = "";
        resizeMessageInput();
        clearAttachment();
        playSendSound();

        setTyping(false);
      } catch (error) {
        alert(getReadableError(error));
      } finally {
        updateSendButton();
      }
    }

    function updateSendButton() {
      $("sendButton").disabled = !$("messageInput").value.trim() && !selectedAttachment;
    }

    function resizeMessageInput() {
      const input = $("messageInput");
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 116) + "px";
    }

    async function setTyping(isTyping) {
      if (!activeChatId || !currentUser) return;

      await setDoc(doc(db, "chats", activeChatId), {
        typing: {
          [currentUser.uid]: isTyping ? serverTimestamp() : null
        }
      }, { merge: true }).catch(() => {});
    }

    function clearAttachment() {
      selectedAttachment = null;
      $("fileInput").value = "";
      $("attachmentPreview").classList.remove("visible");
      $("attachmentName").textContent = "";
      updateSendButton();
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function openProfile() {
      pendingAvatar = myProfile?.avatar || "";
      renderAvatarSlot($("profileAvatarSlot"), { avatar: pendingAvatar }, 96, "profile-avatar");
      $("profileUsernameInput").value = myProfile ? "@" + myProfile.username : "";
      showHint($("profileHint"), "");
      openModal($("profileModal"));
    }

    function openSettings() {
      updateSoundUi();
      openModal($("settingsModal"));
    }

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;

      if (!user) {
        $("authScreen").classList.remove("hidden");
        clearInterval(presenceTimer);
        chatListUnsubscribe?.();
        chatListUnsubscribe = null;
        closeChat();
        return;
      }

      try {
        myProfile = await createProfileIfMissing(user, cleanUsername($("authUsername").value));
        await startSession();
      } catch (error) {
        $("authScreen").classList.remove("hidden");
        showHint($("authHint"), getReadableError(error), true);
      }
    });

    let searchTimer = null;

    $("searchInput").addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(searchUser, 280);
    });

    $("loginButton").addEventListener("click", login);
    $("registerButton").addEventListener("click", register);

    $("profileButton").addEventListener("click", openProfile);
    $("settingsButton").addEventListener("click", openSettings);

    $("closeProfileButton").addEventListener("click", () => closeModal($("profileModal")));
    $("closeSettingsButton").addEventListener("click", () => closeModal($("settingsModal")));

    $("logoutButton").addEventListener("click", async () => {
      await signOut(auth);
      closeModal($("settingsModal"));
    });

    $("saveProfileButton").addEventListener("click", async () => {
      try {
        await saveProfile($("profileUsernameInput").value, pendingAvatar);
        closeModal($("profileModal"));
      } catch (error) {
        showHint($("profileHint"), getReadableError(error), true);
      }
    });

    $("profileUsernameInput").addEventListener("input", () => {
      const username = cleanUsername($("profileUsernameInput").value);
      $("profileUsernameInput").value = username ? "@" + username : "";
    });

    $("avatarInput").addEventListener("change", async () => {
      const file = $("avatarInput").files[0];
      if (!file) return;

      if (file.size > 700 * 1024) {
        showHint($("profileHint"), "Выбери фото меньше 700 КБ.", true);
        return;
      }

      pendingAvatar = await readFileAsDataUrl(file);
      renderAvatarSlot($("profileAvatarSlot"), { avatar: pendingAvatar }, 96, "profile-avatar");
      playClick();
    });

    $("soundSwitch").addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      localStorage.setItem("messengerSoundEnabled", String(soundEnabled));
      updateSoundUi();
      playClick();
    });

    $("backButton").addEventListener("click", closeChat);

    $("chatHeaderAvatarButton").addEventListener("click", () => {
      playClick();
    });

    $("messageInput").addEventListener("input", () => {
      resizeMessageInput();
      updateSendButton();

      clearTimeout(typingTimer);
      clearTimeout(typingStopTimer);

      setTyping(true);

      typingStopTimer = setTimeout(() => {
        setTyping(false);
      }, 3500);
    });

    $("messageInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    $("sendButton").addEventListener("click", sendMessage);

    $("fileInput").addEventListener("change", async () => {
      const file = $("fileInput").files[0];
      if (!file) return;

      if (file.size > MAX_ATTACHMENT_SIZE) {
        alert("Файл слишком большой. Для Firestore выбери фото или видео до 800 КБ.");
        $("fileInput").value = "";
        return;
      }

      if (!file.type.startsWith("image/") && !file.type.startsWith("video/")) {
        alert("Можно прикрепить только фото или видео.");
        $("fileInput").value = "";
        return;
      }

      selectedAttachment = {
        name: file.name,
        type: file.type,
        size: file.size,
        data: await readFileAsDataUrl(file)
      };

      $("attachmentName").textContent = file.type.startsWith("image/")
        ? "Фото готово к отправке"
        : "Видео готово к отправке";

      $("attachmentPreview").classList.add("visible");
      updateSendButton();
      playClick();
    });

    $("clearAttachmentButton").addEventListener("click", clearAttachment);

    document.querySelectorAll(".modal-overlay").forEach((overlay) => {
      overlay.addEventListener("click", (event) => {
        if (event.target === overlay) {
          closeModal(overlay);
        }
      });
    });

    document.addEventListener("pointerdown", (event) => {
      if (event.target.closest("button,label")) {
        getAudioContext();
      }
    }, { passive: true });

    updateSoundUi();
  </script>
</body>
</html>
